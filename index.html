<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>SalesFlow AI Pro · Trusted Commission Hub</title>
  <!-- Font Awesome 6 & Chart.js -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    body {
      background: #f7f7f8;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      transition: background 0.2s;
      padding: 1rem;
    }

    body.dark {
      background: #1a1a1c;
    }

    .app-wrapper {
      display: flex;
      width: 100%;
      max-width: 1600px;
      background: transparent;
      gap: 1rem;
      height: 95vh;
      max-height: 95vh;
    }

    /* ========= SIDEBAR ========= */
    .sidebar {
      width: 280px;
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 28px;
      padding: 1.25rem 0.8rem;
      display: flex;
      flex-direction: column;
      box-shadow: 0 10px 30px -10px rgba(0,0,0,0.1);
      border: 1px solid rgba(0,0,0,0.05);
      transition: width 0.25s ease, padding 0.2s ease;
      overflow-x: hidden;
      flex-shrink: 0;
    }

    .sidebar.collapsed {
      width: 80px;
      padding: 1.25rem 0.4rem;
    }

    body.dark .sidebar {
      background: rgba(32, 33, 35, 0.85);
      border-color: rgba(255,255,255,0.08);
    }

    .sidebar-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 2rem;
      padding: 0 0.5rem;
    }

    .logo-area {
      display: flex;
      align-items: center;
      gap: 10px;
      overflow: hidden;
    }

    .logo-icon {
      background: #f97316;
      min-width: 36px;
      height: 36px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 1.3rem;
    }

    .logo-text {
      font-weight: 600;
      font-size: 1.25rem;
      color: #0f2b43;
      white-space: nowrap;
    }

    body.dark .logo-text {
      color: #f1f5f9;
    }

    .collapse-btn {
      background: transparent;
      border: none;
      color: #f97316;
      font-size: 1.4rem;
      cursor: pointer;
      width: 32px;
      height: 32px;
      border-radius: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .collapse-btn:hover {
      background: rgba(249,115,22,0.1);
    }

    .sidebar-nav {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 0.7rem 1rem;
      border-radius: 14px;
      color: #3c4b5c;
      font-weight: 500;
      white-space: nowrap;
      transition: 0.1s;
      cursor: pointer;
      border: none;
      background: transparent;
      width: 100%;
      text-align: left;
      font-size: 1rem;
    }

    body.dark .nav-item {
      color: #cbd5e1;
    }

    .nav-item i {
      font-size: 1.3rem;
      min-width: 28px;
      color: #f97316;
    }

    .nav-item.active {
      background: rgba(249,115,22,0.15);
      color: #f97316;
    }

    .sidebar.collapsed .logo-text,
    .sidebar.collapsed .nav-item span:not(.icon-only) {
      display: none;
    }

    .sidebar.collapsed .nav-item {
      justify-content: center;
      padding: 0.7rem 0;
    }

    .feature-tag {
      background: #f97316;
      color: white;
      font-size: 0.7rem;
      border-radius: 40px;
      padding: 0.2rem 0.7rem;
      margin-left: auto;
    }

    .sidebar.collapsed .feature-tag {
      display: none;
    }

    /* ========= MAIN PANEL ========= */
    .main-panel {
      flex: 1;
      background: rgba(255,255,255,0.75);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-radius: 32px;
      padding: 1.8rem 2rem;
      border: 1px solid rgba(255,255,255,0.6);
      box-shadow: 0 20px 40px -12px rgba(0,0,0,0.2);
      overflow-y: auto;
      scrollbar-width: thin;
    }

    body.dark .main-panel {
      background: rgba(25, 26, 30, 0.85);
      border-color: rgba(255,255,255,0.05);
    }

    .main-header {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }

    .main-header h1 {
      font-size: 1.8rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      color: #0f2b43;
    }

    body.dark .main-header h1 {
      color: #f1f5f9;
    }

    .theme-toggle {
      margin-left: auto;
      background: rgba(249,115,22,0.15);
      border: 1px solid rgba(249,115,22,0.3);
      border-radius: 3rem;
      padding: 0.4rem 0.8rem;
      font-size: 1.3rem;
      cursor: pointer;
      color: #f97316;
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }

    .page-content {
      animation: fade 0.2s ease;
    }

    @keyframes fade { from { opacity: 0.3; } to { opacity: 1; } }

    .status-dot { width: 12px; height: 12px; border-radius: 20px; display: inline-block; margin-right: 6px; }
    .status-badge { display: inline-flex; align-items: center; padding: 0.3rem 1rem; border-radius: 30px; font-weight: 500; font-size: 0.85rem; background: #f1f5f9; }

    .commission-panel {
      background: linear-gradient(105deg, #fff3e5, #ffe8d6);
      border-left: 6px solid #f97316;
      border-radius: 1.8rem;
      padding: 1.5rem 2rem;
      margin-bottom: 2rem;
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      transition: all 0.3s ease;
    }
    .commission-panel.commission-earned {
      background: linear-gradient(105deg, #e6f7e6, #d4f0d4);
      border-left-color: #22c55e;
      box-shadow: 0 0 20px rgba(34, 197, 94, 0.3);
    }
    body.dark .commission-panel { background: #2a2c35; border-left-color: #f97316; }
    body.dark .commission-panel.commission-earned { background: #1a3a1a; border-left-color: #22c55e; }
    
    .commission-left h3 { font-weight: 600; color: #7b4a1e; }
    body.dark .commission-left h3 { color: #fcd34d; }
    .commission-left p { color: #5a3e24; }
    body.dark .commission-left p { color: #cbd5e1; }
    .commission-highlight {
      background: #f97316; color: white; padding: 0.75rem 2rem; border-radius: 4rem;
      font-weight: 700; font-size: 2.2rem; line-height: 1; position: relative;
      cursor: help;
    }
    .commission-highlight:hover::after {
      content: attr(data-tooltip);
      position: absolute;
      bottom: 100%;
      left: 50%;
      transform: translateX(-50%);
      background: #1e293b;
      color: white;
      padding: 0.5rem 1rem;
      border-radius: 2rem;
      font-size: 0.9rem;
      white-space: nowrap;
      z-index: 100;
      margin-bottom: 0.5rem;
    }
    .progress-wrapper { min-width: 200px; }
    .progress-bg { background: #fcd9b6; height: 12px; border-radius: 30px; }
    .progress-fill { background: #f97316; height: 12px; border-radius: 30px; width: 0%; transition: width 0.3s ease; }
    .progress-fill.earned { background: #22c55e; }
    body.dark .progress-bg { background: #334155; }

    .kpi-grid {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.25rem; margin-bottom: 2rem;
    }
    .kpi-item {
      background: white; border-radius: 1.8rem; padding: 1.2rem; text-align: center; border: 1px solid #edf2f7;
    }
    body.dark .kpi-item { background: #1e293b; border-color: #334155; }
    .kpi-item i { font-size: 1.8rem; background: #f1f5f9; padding: 0.6rem; border-radius: 2rem; color: #f97316; }

    .feature-bar {
      display: flex; flex-wrap: wrap; gap: 0.75rem; margin-bottom: 1.5rem; align-items: center;
    }
    .feature-badge {
      background: white; padding: 0.5rem 1.2rem; border-radius: 3rem; font-size: 0.9rem;
      border: 1px solid #e9eef3; display: flex; align-items: center; gap: 8px;
    }
    body.dark .feature-badge { background: #1e293b; border-color: #334155; color: #cbd5e1; }

    .filter-group {
      display: flex; gap: 6px; background: white; padding: 0.25rem; border-radius: 3rem; border: 1px solid #e2e8f0;
    }
    body.dark .filter-group { background: #0f172a; border-color: #334155; }
    .filter-group button {
      background: transparent; border: none; padding: 0.4rem 1rem; border-radius: 3rem;
      font-weight: 500; color: #475569; cursor: pointer;
    }
    .filter-group button.active-filter { background: #f97316; color: white; }

    .action-button-group { display: flex; gap: 0.5rem; margin-left: auto; }
    .btn-primary, .btn-secondary {
      border: none; padding: 0.6rem 1.5rem; border-radius: 3rem; font-weight: 600;
      cursor: pointer; display: inline-flex; align-items: center; gap: 0.5rem;
    }
    .btn-primary { background: #f97316; color: white; }
    .btn-secondary { background: #1e293b; color: white; }
    body.dark .btn-secondary { background: #f97316; color: #0f172a; }

    .table-wrapper {
      background: white; border-radius: 1.8rem; padding: 0.2rem 0 1rem 0;
      border: 1px solid #edf2f7; overflow-x: auto; margin: 1.5rem 0;
    }
    body.dark .table-wrapper { background: #1e293b; border-color: #334155; }
    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; padding: 1rem 1rem 0.8rem 1.5rem; color: #64748b; }
    td { padding: 0.8rem 1rem 0.8rem 1.5rem; border-bottom: 1px solid #f1f5f9; }
    body.dark td { border-bottom-color: #334155; color: #e2e8f0; }

    .status-dropdown-container {
      position: relative;
      display: inline-block;
    }
    .status-dropdown-btn {
      background: transparent;
      border: 1px solid #d1d5db;
      border-radius: 2rem;
      padding: 0.3rem 1rem 0.3rem 0.8rem;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      cursor: pointer;
      font-size: 0.9rem;
    }
    .status-dropdown-menu {
      position: absolute;
      top: 110%;
      left: 0;
      background: white;
      border-radius: 1.5rem;
      padding: 0.6rem;
      box-shadow: 0 12px 30px rgba(0,0,0,0.15);
      z-index: 50;
      min-width: 160px;
      border: 1px solid #f1f5f9;
      display: none;
    }
    body.dark .status-dropdown-menu {
      background: #1e293b;
      border-color: #334155;
    }
    .status-dropdown-menu.show {
      display: block;
    }
    .status-option {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      padding: 0.5rem 0.8rem;
      border-radius: 2rem;
      cursor: pointer;
      transition: 0.1s;
    }
    .status-option:hover {
      background: #f1f5f9;
    }
    body.dark .status-option:hover {
      background: #334155;
    }
    .status-option .status-dot {
      width: 14px;
      height: 14px;
    }

    .chart-container {
      background: white;
      border-radius: 1.8rem;
      padding: 1.5rem;
      border: 1px solid #edf2f7;
      margin-top: 1.5rem;
      height: 300px;
      position: relative;
    }
    body.dark .chart-container { background: #1e293b; border-color: #334155; }
    
    #analyticsChart {
      max-height: 250px;
      width: 100% !important;
    }

    .modal { display: none; position: fixed; inset:0; background:rgba(0,0,0,0.5); align-items:center; justify-content:center; z-index:1000; backdrop-filter:blur(4px);}
    .modal.active { display:flex; }
    .modal-content { background:white; border-radius:2rem; padding:2rem; max-width:600px; width:90%; max-height:90vh; overflow-y:auto; }
    body.dark .modal-content { background:#1e293b; border:1px solid #334155; }
    .form-group { margin-bottom:1rem; }
    .form-group label { display:block; margin-bottom:0.3rem; color:#475569; }
    body.dark .form-group label { color:#cbd5e1; }
    .form-group input, .form-group select, .form-group textarea {
      width:100%; padding:0.8rem 1rem; border:1px solid #e2e8f0; border-radius:1.5rem; background:#f8fafc; font-size:0.95rem;
      resize: vertical; font-family: inherit;
    }
    body.dark .form-group input, body.dark .form-group select, body.dark .form-group textarea {
      background:#0f172a; color:#f1f5f9; border-color:#334155;
    }
    .form-group textarea { min-height: 80px; }
    .toast {
      position:fixed; bottom:20px; right:20px; background:#1e293b; color:white; padding:0.8rem 1.5rem;
      border-radius:3rem; display:flex; align-items:center; gap:0.8rem; transform:translateX(400px);
      transition:transform 0.3s; z-index:2000;
    }
    .toast.show { transform:translateX(0); }

    .stats-dashboard {
      display: grid; grid-template-columns: repeat(4,1fr); gap:0.75rem; margin-bottom:1.5rem;
    }
    .stat-tile {
      background: white; border-radius:1.5rem; padding:1rem; text-align:center; border:1px solid #e9eef3;
    }
    body.dark .stat-tile { background:#1e293b; border-color:#334155; }
    .stat-tile i { font-size:1.6rem; color:#f97316; }
    .stat-tile .stat-number { font-size:1.8rem; font-weight:600; }

    .insight-chip {
      background:#f1f5f9; border-radius:2rem; padding:0.3rem 1rem; font-size:0.85rem; display:inline-flex; align-items:center; gap:0.3rem; border:1px dashed #f97316;
      cursor: pointer;
    }
    body.dark .insight-chip { background:#0f172a; }

    .sat-badge {
      background: #f97316;
      color: white;
      padding: 0.2rem 0.8rem;
      border-radius: 30px;
      font-weight: 600;
      font-size: 0.8rem;
      position: relative;
      cursor: help;
    }
    .sat-badge.verified {
      background: #22c55e;
    }
    .sat-badge.verified::after {
      content: "✓ Verified";
      position: absolute;
      bottom: 100%;
      left: 50%;
      transform: translateX(-50%);
      background: #1e293b;
      color: white;
      padding: 0.2rem 0.5rem;
      border-radius: 1rem;
      font-size: 0.7rem;
      white-space: nowrap;
      display: none;
    }
    .sat-badge.verified:hover::after {
      display: block;
    }

    .audit-trail {
      margin-top: 2rem;
      padding: 1rem;
      background: #f8fafc;
      border-radius: 1rem;
      border: 1px solid #e2e8f0;
    }
    body.dark .audit-trail {
      background: #0f172a;
      border-color: #334155;
    }
    .audit-entry {
      display: flex;
      gap: 1rem;
      padding: 0.5rem;
      border-bottom: 1px solid #e2e8f0;
      font-size: 0.9rem;
    }
    body.dark .audit-entry {
      border-bottom-color: #334155;
    }
    .audit-time {
      color: #64748b;
      min-width: 100px;
    }

    .trust-score {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 1rem;
      border-radius: 1rem;
      margin-bottom: 1rem;
    }
    .trust-meter {
      height: 10px;
      background: rgba(255,255,255,0.3);
      border-radius: 5px;
      margin: 0.5rem 0;
    }
    .trust-fill {
      height: 100%;
      background: white;
      border-radius: 5px;
      transition: width 0.3s ease;
    }
    .validation-warning {
      background: #fee2e2;
      border: 1px solid #ef4444;
      color: #991b1b;
      padding: 0.5rem 1rem;
      border-radius: 2rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.5rem;
    }
    body.dark .validation-warning {
      background: #451a1a;
      color: #fecaca;
    }
    .data-quality-tip {
      background: #fef3c7;
      border: 1px solid #f59e0b;
      color: #92400e;
      padding: 0.5rem 1rem;
      border-radius: 2rem;
      font-size: 0.9rem;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
    }
    @media (max-width: 780px) {
      .app-wrapper { flex-direction: column; height: auto; }
      .sidebar { width: 100%; flex-direction: row; flex-wrap: wrap; }
      .sidebar.collapsed { width: 100%; }
      .sidebar-nav { flex-direction: row; flex-wrap: wrap; }
      .nav-item { width: auto; }
      .main-panel { padding: 1rem; }
    }
  </style>
</head>
<body>
<div class="app-wrapper">
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo-area"><div class="logo-icon"><i class="fa-regular fa-message"></i></div><span class="logo-text">SalesFlow AI Pro</span></div>
      <button class="collapse-btn" id="collapseSidebarBtn"><i class="fa-solid fa-chevron-left"></i></button>
    </div>
    <div class="sidebar-nav">
      <button class="nav-item active" id="nav-appointments"><i class="fa-regular fa-calendar-check"></i> <span>Appointments</span></button>
      <button class="nav-item" id="nav-analytics"><i class="fa-regular fa-chart-bar"></i> <span>Analytics</span> <span class="feature-tag">new</span></button>
      <button class="nav-item" id="nav-alerts"><i class="fa-regular fa-bell"></i> <span>Smart Alerts</span> <span class="feature-tag">beta</span></button>
      <button class="nav-item" id="nav-sources"><i class="fa-regular fa-star"></i> <span>Top Sources</span></button>
      <button class="nav-item" id="nav-noshow"><i class="fa-regular fa-clock"></i> <span>No‑show guard</span> <span class="feature-tag">+2</span></button>
      <button class="nav-item" id="nav-audit"><i class="fa-regular fa-clock"></i> <span>Audit Trail</span> <span class="feature-tag">new</span></button>
    </div>
    <div style="margin-top: auto; padding:1rem 0.5rem; color:#94a3b8; font-size:0.85rem;" id="trustScoreIndicator"><i class="fa-regular fa-circle-check" style="color:#22c55e;"></i> <span>Trust Score: 100%</span></div>
  </div>
  <div class="main-panel">
    <div class="main-header">
      <h1 id="page-title"><i class="fas fa-chart-line" style="color:#f97316;"></i> Trusted Commission Hub</h1>
      <div class="theme-toggle" id="themeToggle"><i class="fa-regular fa-sun"></i><i class="fa-regular fa-moon"></i></div>
    </div>
    <div id="page-content-container" class="page-content"></div>
  </div>
</div>

<!-- MODAL -->
<div class="modal" id="appointmentModal">
  <div class="modal-content">
    <div class="modal-header" style="display:flex; justify-content:space-between; align-items:center;"><h2 id="modalTitle">Add Appointment</h2><button class="close-modal" id="closeModalBtn" style="background:none; border:none; font-size:2rem; cursor:pointer;">&times;</button></div>
    <div id="validationMessage" class="validation-warning" style="display: none;"></div>
    <div class="form-group"><label>Client *</label><input id="client" placeholder="Full name / company"></div>
    <div class="form-group"><label>Date & Time *</label><input type="datetime-local" id="dateTime"></div>
    <div class="form-group"><label>Industry</label><select id="industry"><option value="">Select</option><option>Construction</option><option>Healthcare</option><option>Ecommerce</option><option>Real Estate</option><option>Marketing</option></select></div>
    <div class="form-group"><label>Source (SAT only counts for commission)</label><select id="source"><option value="">Select</option><option>Cold Call</option><option>LinkedIn</option><option>SAT</option><option>Email</option><option>Referral</option></select></div>
    <div class="form-group"><label>Status</label><select id="status"><option value="Pending">⏳ Pending</option><option value="Confirmed">✅ Confirmed</option><option value="Cancelled">❌ Cancelled</option></select></div>
    <div class="form-group"><label>CRM Link</label><input id="crm" placeholder="https://..."></div>
    <div class="form-group"><label>Meeting Platform</label><input id="meetingPlatform" placeholder="e.g. Teams, Zoom, Google Meet"></div>
    <div class="form-group"><label>Notes</label><textarea id="notes" placeholder="Meeting details, follow-ups..."></textarea></div>
    <div class="modal-actions" style="display:flex; justify-content:flex-end; gap:1rem; margin-top:1.5rem;">
      <button class="btn-secondary" id="cancelModalBtn">Cancel</button>
      <button class="btn-primary" onclick="saveAppointment()">Save</button>
    </div>
  </div>
</div>

<div class="modal" id="auditModal"><div class="modal-content"><div class="modal-header"><h2>Appointment History</h2><button class="close-modal" id="closeAuditModalBtn" style="background:none; border:none; font-size:2rem; cursor:pointer;">&times;</button></div><div id="auditHistoryContent"></div></div></div>
<div class="toast" id="toast"><i class="fa-regular fa-circle-check"></i><span id="toastMessage">Saved</span></div>

<script>
  (function() {
    const body = document.body;
    const themeToggle = document.getElementById('themeToggle');
    if (localStorage.getItem('darkMode') === 'true') body.classList.add('dark');
    themeToggle.addEventListener('click', () => {
      body.classList.toggle('dark');
      localStorage.setItem('darkMode', body.classList.contains('dark'));
    });
    const sidebar = document.getElementById('sidebar');
    const collapseBtn = document.getElementById('collapseSidebarBtn');
    collapseBtn.addEventListener('click', () => {
      sidebar.classList.toggle('collapsed');
      const icon = collapseBtn.querySelector('i');
      icon.classList.toggle('fa-chevron-left');
      icon.classList.toggle('fa-chevron-right');
    });
  })();

  const STATUS_CONFIG = { 'Pending': { color: '#f97316', label: '⏳ Pending' }, 'Confirmed': { color: '#22c55e', label: '✅ Confirmed' }, 'Cancelled': { color: '#ef4444', label: '❌ Cancelled' } };
  let auditLog = JSON.parse(localStorage.getItem("auditLog")) || [];
  function addAuditEntry(action, details, appointmentId = null) { auditLog.unshift({ id: crypto.randomUUID?.() || Date.now(), timestamp: new Date().toISOString(), action, details, appointmentId }); if (auditLog.length > 100) auditLog = auditLog.slice(0,100); localStorage.setItem("auditLog", JSON.stringify(auditLog)); }
  
  let data = JSON.parse(localStorage.getItem("appointments")) || [];
  if (data.length === 0) { const y = new Date().getFullYear(), m = String(new Date().getMonth()+1).padStart(2,'0'); data = [ { id: crypto.randomUUID?.()||'1', client: 'ABC Construction', date: `${y}-${m}-15T14:00`, industry: 'Construction', source: 'SAT', status: 'Confirmed', crm: '', notes: 'Interested in premium', verified: true, meeting: 'Teams' }, { id: crypto.randomUUID?.()||'2', client: 'XYZ Marketing', date: `${y}-${m}-10T11:30`, industry: 'Marketing', source: 'SAT', status: 'Confirmed', crm: '', notes: 'Follow up', verified: true, meeting: 'Zoom' } ]; data.forEach(item => addAuditEntry('CREATE', `Created ${item.client}`, item.id)); saveData(); }
  data = data.map(item => ({ ...item, verified: item.source === 'SAT' ? true : (item.verified||false), id: item.id || crypto.randomUUID?.()||Date.now() }));
  saveData();
  let editId = null, currentFilter = "all", currentPage = "appointments", analyticsChart = null;
  const modal = document.getElementById('appointmentModal'), auditModal = document.getElementById('auditModal'), closeModalBtn = document.getElementById('closeModalBtn'), cancelModalBtn = document.getElementById('cancelModalBtn'), closeAuditModalBtn = document.getElementById('closeAuditModalBtn'), toast = document.getElementById('toast'), toastMessage = document.getElementById('toastMessage'), pageContainer = document.getElementById('page-content-container'), pageTitle = document.getElementById('page-title');
  function showToast(msg) { toastMessage.innerText = msg; toast.classList.add('show'); setTimeout(() => toast.classList.remove('show'), 2500); }

  modal.addEventListener('click', (e) => e.target === modal && modal.classList.remove('active'));
  closeAuditModalBtn.addEventListener('click', () => auditModal.classList.remove('active'));
  auditModal.addEventListener('click', (e) => e.target === auditModal && auditModal.classList.remove('active'));

  function checkDuplicate(clientRaw, dateTimeRaw, excludeId) {
    if (!clientRaw || !dateTimeRaw) return false;
    return data.some(item => item.client.toLowerCase() === clientRaw.toLowerCase() && item.date === dateTimeRaw && item.id !== excludeId);
  }
  window.saveAppointment = function() {
    let client = document.getElementById("client").value.trim();
    let dateTime = document.getElementById("dateTime").value;
    let source = document.getElementById("source").value;
    if (!client || !dateTime) { document.getElementById("validationMessage").innerHTML = '<i class="fa-regular fa-circle-exclamation"></i> Client & Date/Time required'; document.getElementById("validationMessage").style.display = 'block'; return; }
    if (checkDuplicate(client, dateTime, editId)) { document.getElementById("validationMessage").innerHTML = '<i class="fa-regular fa-circle-exclamation"></i> Duplicate: same client & datetime already exists.'; document.getElementById("validationMessage").style.display = 'block'; return; }
    let obj = { id: editId || (crypto.randomUUID?.() || Date.now()+'-'+Math.random()), client, date: dateTime, industry: document.getElementById("industry").value, source, status: document.getElementById("status").value, crm: document.getElementById("crm").value.trim(), meeting: document.getElementById("meetingPlatform").value.trim() || "Teams", notes: document.getElementById("notes").value.trim(), verified: source === 'SAT' };

    else { data.push(obj); addAuditEntry('CREATE', `Created ${client}`, obj.id); showToast("Added"); }
    saveData(); modal.classList.remove('active'); renderCurrentPage();
  };
  window.editAppointment = (id) => { let item = data.find(a => a.id === id); if(!item) return; document.getElementById("client").value = item.client||""; document.getElementById("dateTime").value = item.date||""; document.getElementById("industry").value = item.industry||""; document.getElementById("source").value = item.source||""; document.getElementById("status").value = item.status||"Pending"; document.getElementById("crm").value = item.crm||""; document.getElementById("meetingPlatform").value = item.meeting||""; document.getElementById("notes").value = item.notes||""; editId = id; document.getElementById('modalTitle').innerText = 'Edit Appointment'; document.getElementById("validationMessage").style.display = 'none'; modal.classList.add('active'); };
  window.deleteAppointment = (id) => { if(confirm("Delete?")){ let item = data.find(i=>i.id===id); data = data.filter(i=>i.id!==id); if(item) addAuditEntry('DELETE', `Deleted ${item.client}`, id); saveData(); if(editId===id) editId=null; renderCurrentPage(); showToast("Deleted"); } };
  window.viewHistory = (id) => { let item = data.find(a=>a.id===id); let history = auditLog.filter(e=>e.appointmentId===id); let html = `<h3>History for ${item?.client||'Appointment'}</h3>`; if(!history.length) html+='<p>No history</p>'; else { html+='<div class="audit-trail">'; history.forEach(entry=>{ let d=new Date(entry.timestamp); html+=`<div class="audit-entry"><span class="audit-time">${d.toLocaleString()}</span><span><strong>${entry.action}</strong></span><span>${entry.details}</span></div>`; }); html+='</div>'; } document.getElementById('auditHistoryContent').innerHTML = html; auditModal.classList.add('active'); };
  window.verifySource = (id) => { let item = data.find(a=>a.id===id); if(item){ item.verified=!item.verified; addAuditEntry('VERIFY', `${item.verified?'Verified':'Unverified'} ${item.client}`, id); saveData(); renderCurrentPage(); showToast(`Source ${item.verified?'verified':'unverified'}`); } };
  function getSATCountThisMonth() { const now = new Date(); return data.filter(i => i.source === 'SAT' && i.status === 'Confirmed' && new Date(i.date).getMonth() === now.getMonth() && new Date(i.date).getFullYear() === now.getFullYear()).length; }
  function computeCommission() { let cnt = getSATCountThisMonth(); return cnt >= 8 ? cnt * 750 : 0; }
  function getCommissionBreakdown() { let cnt = getSATCountThisMonth(); if(cnt<8) return `Need ${8-cnt} more SAT confirmations`; return `${cnt} × 750 = ${cnt*750} PHP`; }
  function calculateTrustScore() { let score = 100, issues = []; data.forEach(i=>{ if(!i.client) score-=2; if(!i.date) score-=2; if(i.source==='SAT' && i.status==='Confirmed' && !i.verified) { score-=3; issues.push('Unverified SAT'); } }); const seen = new Set(); data.forEach(i=>{ let key=`${i.client}-${i.date}`; if(seen.has(key)) score-=5; seen.add(key); }); let final = Math.max(0,score); const trustEl = document.getElementById('trustScoreIndicator'); if(trustEl) trustEl.innerHTML = `<i class="fa-regular fa-circle-check" style="color:${final>=90?'#22c55e':final>=70?'#f97316':'#ef4444'};"></i> <span>Trust Score: ${final}%</span>`; return { score: final, issues }; }
  function updateTrustScore() { calculateTrustScore(); }
  function getStats() { const today = new Date(); let week=0,month=0,year=0; const wNum = (d)=>{ let fJan=new Date(d.getFullYear(),0,1); return Math.ceil(((d-fJan)/86400000+fJan.getDay()+1)/7); }; data.forEach(a=>{ let d=new Date(a.date); if(isNaN(d)) return; if(d.getFullYear()===today.getFullYear()) year++; if(d.getMonth()===today.getMonth() && d.getFullYear()===today.getFullYear()) month++; if(d.getFullYear()===today.getFullYear() && wNum(d)===wNum(today)) week++; }); return {week,month,year}; }
  function getTopSource() { let freq = {}; data.forEach(d=>{ if(d.source) freq[d.source]=(freq[d.source]||0)+1; }); let entries = Object.entries(freq); if(!entries.length) return '-'; return entries.sort((a,b)=>b[1]-a[1])[0][0]; }
  function calculateStreak() { let confirmedDates = data.filter(a=>a.status==='Confirmed').map(a=>new Date(a.date).toDateString()).filter((v,i,s)=>s.indexOf(v)===i).sort((a,b)=>new Date(a)-new Date(b)); if(!confirmedDates.length) return 0; let max=1,cur=1; for(let i=1;i<confirmedDates.length;i++){ let diff = (new Date(confirmedDates[i]) - new Date(confirmedDates[i-1]))/86400000; if(diff===1) cur++; else { max=Math.max(max,cur); cur=1; } } return Math.max(max,cur); }
  function getMonthlyData() { let months = new Array(12).fill(0); data.forEach(a=>{ let d=new Date(a.date); if(!isNaN(d)) months[d.getMonth()]++; }); return months; }
  window.updateStatusFromDropdown = (appId, newStatus) => { let app = data.find(a=>a.id===appId); if(app){ let old=app.status; app.status=newStatus; addAuditEntry('STATUS_CHANGE', `${app.client}: ${old} → ${newStatus}`, appId); saveData(); renderCurrentPage(); showToast(`Status → ${newStatus}`); } };
  window.toggleDropdown = (id) => { document.querySelectorAll('.status-dropdown-menu').forEach(m=>{ if(m.id!==id) m.classList.remove('show'); }); let menu = document.getElementById(id); if(menu) menu.classList.toggle('show'); };

    <div class="commission-panel ${commissionEarned?'commission-earned':''}"><div class="commission-left"><h3><i class="fas fa-circle-dollar-to-slot"></i> SAT commission</h3><p>✅ Only SAT + Confirmed</p><p>🎯 Target: 8 SAT = 6,000 PHP</p></div><div class="commission-highlight" data-tooltip="${getCommissionBreakdown()}"><span>${commission} PHP</span><small>this month</small></div><div class="progress-wrapper"><div class="progress-label" style="display:flex; justify-content:space-between;"><span>✅ SAT confirmed</span><span>${satThisMonth} / 8</span></div><div class="progress-bg"><div class="progress-fill ${commissionEarned?'earned':''}" style="width:${progressPercent}%;"></div></div>${commissionEarned?`<div style="margin-top:0.3rem; color:#22c55e;">✓ Commission active: ${satThisMonth} × 750 PHP = ${commission} PHP</div>`:`<div style="margin-top:0.3rem; color:#f97316;">${8-satThisMonth} more to earn</div>`}</div></div>
    <div class="kpi-grid"><div class="kpi-item"><i class="fa-regular fa-calendar-check"></i><h2>${stats.week}</h2><p>this week</p></div><div class="kpi-item"><i class="fa-regular fa-calendar"></i><h2>${stats.month}</h2><p>this month</p></div><div class="kpi-item"><i class="fa-regular fa-calendar-plus"></i><h2>${stats.year}</h2><p>this year</p></div></div>
    <div class="feature-bar"><div class="feature-badge"><i class="fa-regular fa-star"></i> top source: ${topSource}</div><div class="feature-badge"><i class="fa-regular fa-fire"></i> streak: ${streak}</div><div class="filter-group" id="filterGroup"><button class="${currentFilter==='all'?'active-filter':''}" data-filter="all">All</button>${Object.keys(STATUS_CONFIG).map(s=>`<button class="${currentFilter===s?'active-filter':''}" data-filter="${s}">${STATUS_CONFIG[s].label}</button>`).join('')}</div><div class="action-button-group"><button class="btn-primary" id="openAddModalBtn"><i class="fa-solid fa-plus"></i> New</button><button class="btn-secondary" onclick="exportCSV()"><i class="fa-regular fa-file-excel"></i> Export</button><button class="btn-secondary" onclick="clearFilter()"><i class="fa-solid fa-filter-circle-xmark"></i> Clear</button></div></div>

    pageContainer.innerHTML = html; pageTitle.innerHTML = '<i class="fas fa-chart-line" style="color:#f97316;"></i> Trusted Commission Hub';
    document.querySelectorAll('#filterGroup button').forEach(btn=>{ btn.addEventListener('click',function(){ document.querySelectorAll('#filterGroup button').forEach(b=>b.classList.remove('active-filter')); this.classList.add('active-filter'); currentFilter=this.dataset.filter; renderAppointmentsPage(); }); });

  }

  function renderAnalyticsPage(){ let monthlyData=getMonthlyData(); let html=`<div class="trust-score"><h3><i class="fa-regular fa-shield"></i> Data Trust Score: ${calculateTrustScore().score}%</h3><div class="trust-meter"><div class="trust-fill" style="width: ${calculateTrustScore().score}%;"></div></div></div><div class="analytics-grid" style="display:grid;grid-template-columns:repeat(3,1fr);gap:1.5rem;"><div class="analytics-card"><h3>Total</h3><div class="value">${data.length}</div></div><div class="analytics-card"><h3>Confirmed</h3><div class="value">${data.filter(d=>d.status==='Confirmed').length}</div></div><div class="analytics-card"><h3>SAT this month</h3><div class="value">${getSATCountThisMonth()}</div></div></div><div class="chart-container"><canvas id="analyticsChart" style="height:250px; width:100%;"></canvas></div>`; pageContainer.innerHTML=html; pageTitle.innerHTML='<i class="fa-regular fa-chart-bar"></i> Analytics'; let canvas=document.getElementById('analyticsChart'); if(canvas){ if(analyticsChart) analyticsChart.destroy(); canvas.style.height='250px'; analyticsChart=new Chart(canvas,{type:'bar',data:{labels:["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"],datasets:[{label:"Appointments",data:monthlyData,backgroundColor:"#f97316",borderRadius:6}]},options:{responsive:true,maintainAspectRatio:false}}); } }
  function renderAlertsPage(){ let upcoming=data.filter(a=>new Date(a.date)>new Date() && a.status!=='Confirmed').length; let unverified=data.filter(a=>a.source==='SAT' && !a.verified).length; pageContainer.innerHTML=`<div style="padding:2rem;text-align:center;"><i class="fa-regular fa-bell" style="font-size:4rem;color:#f97316;"></i><h2>Smart Alerts</h2><div class="analytics-card" style="max-width:300px;margin:1rem auto;"><h3>Upcoming non‑confirmed</h3><div class="value">${upcoming}</div></div><div class="analytics-card" style="max-width:300px;margin:auto;"><h3>Unverified SAT</h3><div class="value">${unverified}</div></div></div>`; pageTitle.innerHTML='<i class="fa-regular fa-bell"></i> Smart Alerts'; }
  function renderSourcesPage(){ let freq={}; data.forEach(d=>{if(d.source) freq[d.source]=(freq[d.source]||0)+1;}); let entries=Object.entries(freq).sort((a,b)=>b[1]-a[1]); pageContainer.innerHTML=`<div style="padding:2rem;"><h2>Top Lead Sources</h2>${entries.map(([s,c])=>`<div style="background:white;margin:0.5rem 0;padding:1rem 1.5rem;border-radius:3rem;display:flex;justify-content:space-between;"><span>${s}</span> <strong>${c}</strong></div>`).join('')}</div>`; pageTitle.innerHTML='<i class="fa-regular fa-star"></i> Top Sources'; }
