<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SalesFlow AI Pro · Trusted Commission Hub</title>
  <!-- Font Awesome 6 (free) & Chart.js -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    body {
      background: #f7f7f8;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      transition: background 0.2s;
      padding: 1rem;
    }

    body.dark {
      background: #1a1a1c;
    }

    .app-wrapper {
      display: flex;
      width: 100%;
      max-width: 1600px;
      background: transparent;
      gap: 1rem;
      height: 95vh;
      max-height: 95vh;
    }

    /* ========= SIDEBAR ========= */
    .sidebar {
      width: 280px;
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 28px;
      padding: 1.25rem 0.8rem;
      display: flex;
      flex-direction: column;
      box-shadow: 0 10px 30px -10px rgba(0,0,0,0.1);
      border: 1px solid rgba(0,0,0,0.05);
      transition: width 0.25s ease, padding 0.2s ease;
      overflow-x: hidden;
      flex-shrink: 0;
    }

    .sidebar.collapsed {
      width: 80px;
      padding: 1.25rem 0.4rem;
    }

    body.dark .sidebar {
      background: rgba(32, 33, 35, 0.85);
      border-color: rgba(255,255,255,0.08);
    }

    .sidebar-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 2rem;
      padding: 0 0.5rem;
    }

    .logo-area {
      display: flex;
      align-items: center;
      gap: 10px;
      overflow: hidden;
    }

    .logo-icon {
      background: #f97316;
      min-width: 36px;
      height: 36px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 1.3rem;
    }

    .logo-text {
      font-weight: 600;
      font-size: 1.25rem;
      color: #0f2b43;
      white-space: nowrap;
    }

    body.dark .logo-text {
      color: #f1f5f9;
    }

    .collapse-btn {
      background: transparent;
      border: none;
      color: #f97316;
      font-size: 1.4rem;
      cursor: pointer;
      width: 32px;
      height: 32px;
      border-radius: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .collapse-btn:hover {
      background: rgba(249,115,22,0.1);
    }

    .sidebar-nav {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 0.7rem 1rem;
      border-radius: 14px;
      color: #3c4b5c;
      font-weight: 500;
      white-space: nowrap;
      transition: 0.1s;
      cursor: pointer;
      border: none;
      background: transparent;
      width: 100%;
      text-align: left;
      font-size: 1rem;
    }

    body.dark .nav-item {
      color: #cbd5e1;
    }

    .nav-item i {
      font-size: 1.3rem;
      min-width: 28px;
      color: #f97316;
    }

    .nav-item.active {
      background: rgba(249,115,22,0.15);
      color: #f97316;
    }

    .sidebar.collapsed .logo-text,
    .sidebar.collapsed .nav-item span:not(.icon-only) {
      display: none;
    }

    .sidebar.collapsed .nav-item {
      justify-content: center;
      padding: 0.7rem 0;
    }

    .feature-tag {
      background: #f97316;
      color: white;
      font-size: 0.7rem;
      border-radius: 40px;
      padding: 0.2rem 0.7rem;
      margin-left: auto;
    }

    .sidebar.collapsed .feature-tag {
      display: none;
    }

    /* ========= MAIN PANEL ========= */
    .main-panel {
      flex: 1;
      background: rgba(255,255,255,0.75);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-radius: 32px;
      padding: 1.8rem 2rem;
      border: 1px solid rgba(255,255,255,0.6);
      box-shadow: 0 20px 40px -12px rgba(0,0,0,0.2);
      overflow-y: auto;
      scrollbar-width: thin;
    }

    body.dark .main-panel {
      background: rgba(25, 26, 30, 0.85);
      border-color: rgba(255,255,255,0.05);
    }

    .main-header {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .main-header h1 {
      font-size: 1.8rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      color: #0f2b43;
    }

    body.dark .main-header h1 {
      color: #f1f5f9;
    }

    .theme-toggle {
      margin-left: auto;
      background: rgba(249,115,22,0.15);
      border: 1px solid rgba(249,115,22,0.3);
      border-radius: 3rem;
      padding: 0.4rem 0.8rem;
      font-size: 1.3rem;
      cursor: pointer;
      color: #f97316;
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }

    .page-content {
      animation: fade 0.2s ease;
    }

    @keyframes fade { from { opacity: 0.3; } to { opacity: 1; } }

    /* Status colors */
    .status-dot { width: 12px; height: 12px; border-radius: 20px; display: inline-block; margin-right: 6px; }
    .status-badge { display: inline-flex; align-items: center; padding: 0.3rem 1rem; border-radius: 30px; font-weight: 500; font-size: 0.85rem; background: #f1f5f9; }

    /* Commission panel */
    .commission-panel {
      background: linear-gradient(105deg, #fff3e5, #ffe8d6);
      border-left: 6px solid #f97316;
      border-radius: 1.8rem;
      padding: 1.5rem 2rem;
      margin-bottom: 2rem;
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      transition: all 0.3s ease;
    }
    .commission-panel.commission-earned {
      background: linear-gradient(105deg, #e6f7e6, #d4f0d4);
      border-left-color: #22c55e;
      box-shadow: 0 0 20px rgba(34, 197, 94, 0.3);
    }
    body.dark .commission-panel { background: #2a2c35; border-left-color: #f97316; }
    body.dark .commission-panel.commission-earned { background: #1a3a1a; border-left-color: #22c55e; }
    
    .commission-left h3 { font-weight: 600; color: #7b4a1e; }
    body.dark .commission-left h3 { color: #fcd34d; }
    .commission-left p { color: #5a3e24; }
    body.dark .commission-left p { color: #cbd5e1; }
    .commission-highlight {
      background: #f97316; color: white; padding: 0.75rem 2rem; border-radius: 4rem;
      font-weight: 700; font-size: 2.2rem; line-height: 1; position: relative;
      cursor: help;
    }
    .commission-highlight:hover::after {
      content: attr(data-tooltip);
      position: absolute;
      bottom: 100%;
      left: 50%;
      transform: translateX(-50%);
      background: #1e293b;
      color: white;
      padding: 0.5rem 1rem;
      border-radius: 2rem;
      font-size: 0.9rem;
      white-space: nowrap;
      z-index: 100;
      margin-bottom: 0.5rem;
    }
    .progress-wrapper { min-width: 200px; }
    .progress-bg { background: #fcd9b6; height: 12px; border-radius: 30px; }
    .progress-fill { background: #f97316; height: 12px; border-radius: 30px; width: 0%; transition: width 0.3s ease; }
    .progress-fill.earned { background: #22c55e; }
    body.dark .progress-bg { background: #334155; }

    .kpi-grid {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.25rem; margin-bottom: 2rem;
    }
    .kpi-item {
      background: white; border-radius: 1.8rem; padding: 1.2rem; text-align: center; border: 1px solid #edf2f7;
    }
    body.dark .kpi-item { background: #1e293b; border-color: #334155; }
    .kpi-item i { font-size: 1.8rem; background: #f1f5f9; padding: 0.6rem; border-radius: 2rem; color: #f97316; }

    .feature-bar {
      display: flex; flex-wrap: wrap; gap: 0.75rem; margin-bottom: 1.5rem; align-items: center;
    }
    .feature-badge {
      background: white; padding: 0.5rem 1.2rem; border-radius: 3rem; font-size: 0.9rem;
      border: 1px solid #e9eef3; display: flex; align-items: center; gap: 8px;
    }
    body.dark .feature-badge { background: #1e293b; border-color: #334155; color: #cbd5e1; }

    /* filter group */
    .filter-group {
      display: flex; gap: 6px; background: white; padding: 0.25rem; border-radius: 3rem; border: 1px solid #e2e8f0;
    }
    body.dark .filter-group { background: #0f172a; border-color: #334155; }
    .filter-group button {
      background: transparent; border: none; padding: 0.4rem 1rem; border-radius: 3rem;
      font-weight: 500; color: #475569; cursor: pointer;
    }
    .filter-group button.active-filter { background: #f97316; color: white; }

    .action-button-group { display: flex; gap: 0.5rem; margin-left: auto; }
    .btn-primary, .btn-secondary {
      border: none; padding: 0.6rem 1.5rem; border-radius: 3rem; font-weight: 600;
      cursor: pointer; display: inline-flex; align-items: center; gap: 0.5rem;
    }
    .btn-primary { background: #f97316; color: white; }
    .btn-secondary { background: #1e293b; color: white; }
    body.dark .btn-secondary { background: #f97316; color: #0f172a; }

    .table-wrapper {
      background: white; border-radius: 1.8rem; padding: 0.2rem 0 1rem 0;
      border: 1px solid #edf2f7; overflow-x: auto; margin: 1.5rem 0;
    }
    body.dark .table-wrapper { background: #1e293b; border-color: #334155; }
    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; padding: 1rem 1rem 0.8rem 1.5rem; color: #64748b; }
    td { padding: 0.8rem 1rem 0.8rem 1.5rem; border-bottom: 1px solid #f1f5f9; }
    body.dark td { border-bottom-color: #334155; color: #e2e8f0; }

    /* status dropdown (central) */
    .status-dropdown-container {
      position: relative;
      display: inline-block;
    }
    .status-dropdown-btn {
      background: transparent;
      border: 1px solid #d1d5db;
      border-radius: 2rem;
      padding: 0.3rem 1rem 0.3rem 0.8rem;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      cursor: pointer;
      font-size: 0.9rem;
    }
    .status-dropdown-menu {
      position: absolute;
      top: 110%;
      left: 0;
      background: white;
      border-radius: 1.5rem;
      padding: 0.6rem;
      box-shadow: 0 12px 30px rgba(0,0,0,0.15);
      z-index: 50;
      min-width: 160px;
      border: 1px solid #f1f5f9;
      display: none;
    }
    body.dark .status-dropdown-menu {
      background: #1e293b;
      border-color: #334155;
    }
    .status-dropdown-menu.show {
      display: block;
    }
    .status-option {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      padding: 0.5rem 0.8rem;
      border-radius: 2rem;
      cursor: pointer;
      transition: 0.1s;
    }
    .status-option:hover {
      background: #f1f5f9;
    }
    body.dark .status-option:hover {
      background: #334155;
    }
    .status-option .status-dot {
      width: 14px;
      height: 14px;
    }

    .chart-container {
      background: white;
      border-radius: 1.8rem;
      padding: 1.5rem;
      border: 1px solid #edf2f7;
      margin-top: 1.5rem;
      height: 300px;
      position: relative;
    }
    body.dark .chart-container { background: #1e293b; border-color: #334155; }
    
    #analyticsChart {
      max-height: 250px;
      width: 100% !important;
    }

    /* Modal */
    .modal { display: none; position: fixed; inset:0; background:rgba(0,0,0,0.5); align-items:center; justify-content:center; z-index:1000; backdrop-filter:blur(4px);}
    .modal.active { display:flex; }
    .modal-content { background:white; border-radius:2rem; padding:2rem; max-width:600px; width:90%; max-height:90vh; overflow-y:auto; }
    body.dark .modal-content { background:#1e293b; border:1px solid #334155; }
    .form-group { margin-bottom:1rem; }
    .form-group label { display:block; margin-bottom:0.3rem; color:#475569; }
    body.dark .form-group label { color:#cbd5e1; }
    .form-group input, .form-group select, .form-group textarea {
      width:100%; padding:0.8rem 1rem; border:1px solid #e2e8f0; border-radius:1.5rem; background:#f8fafc; font-size:0.95rem;
      resize: vertical; font-family: inherit;
    }
    body.dark .form-group input, body.dark .form-group select, body.dark .form-group textarea {
      background:#0f172a; color:#f1f5f9; border-color:#334155;
    }
    .form-group textarea { min-height: 80px; }
    .toast {
      position:fixed; bottom:20px; right:20px; background:#1e293b; color:white; padding:0.8rem 1.5rem;
      border-radius:3rem; display:flex; align-items:center; gap:0.8rem; transform:translateX(400px);
      transition:transform 0.3s; z-index:2000;
    }
    .toast.show { transform:translateX(0); }

    /* quick stats dashboard */
    .stats-dashboard {
      display: grid; grid-template-columns: repeat(4,1fr); gap:0.75rem; margin-bottom:1.5rem;
    }
    .stat-tile {
      background: white; border-radius:1.5rem; padding:1rem; text-align:center; border:1px solid #e9eef3;
    }
    body.dark .stat-tile { background:#1e293b; border-color:#334155; }
    .stat-tile i { font-size:1.6rem; color:#f97316; }
    .stat-tile .stat-number { font-size:1.8rem; font-weight:600; }

    /* intelligent notes insight */
    .insight-chip {
      background:#f1f5f9; border-radius:2rem; padding:0.3rem 1rem; font-size:0.85rem; display:inline-flex; align-items:center; gap:0.3rem; border:1px dashed #f97316;
      cursor: pointer;
    }
    body.dark .insight-chip { background:#0f172a; }

    /* SAT badge highlight */
    .sat-badge {
      background: #f97316;
      color: white;
      padding: 0.2rem 0.8rem;
      border-radius: 30px;
      font-weight: 600;
      font-size: 0.8rem;
      position: relative;
      cursor: help;
    }
    .sat-badge.verified {
      background: #22c55e;
    }
    .sat-badge.verified::after {
      content: "✓ Verified";
      position: absolute;
      bottom: 100%;
      left: 50%;
      transform: translateX(-50%);
      background: #1e293b;
      color: white;
      padding: 0.2rem 0.5rem;
      border-radius: 1rem;
      font-size: 0.7rem;
      white-space: nowrap;
      display: none;
    }
    .sat-badge.verified:hover::after {
      display: block;
    }

    /* Audit trail */
    .audit-trail {
      margin-top: 2rem;
      padding: 1rem;
      background: #f8fafc;
      border-radius: 1rem;
      border: 1px solid #e2e8f0;
    }
    body.dark .audit-trail {
      background: #0f172a;
      border-color: #334155;
    }
    .audit-entry {
      display: flex;
      gap: 1rem;
      padding: 0.5rem;
      border-bottom: 1px solid #e2e8f0;
      font-size: 0.9rem;
    }
    body.dark .audit-entry {
      border-bottom-color: #334155;
    }
    .audit-time {
      color: #64748b;
      min-width: 100px;
    }

    /* Trust score */
    .trust-score {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 1rem;
      border-radius: 1rem;
      margin-bottom: 1rem;
    }
    .trust-meter {
      height: 10px;
      background: rgba(255,255,255,0.3);
      border-radius: 5px;
      margin: 0.5rem 0;
    }
    .trust-fill {
      height: 100%;
      background: white;
      border-radius: 5px;
      transition: width 0.3s ease;
    }

    /* Validation warning */
    .validation-warning {
      background: #fee2e2;
      border: 1px solid #ef4444;
      color: #991b1b;
      padding: 0.5rem 1rem;
      border-radius: 2rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.5rem;
    }
    body.dark .validation-warning {
      background: #451a1a;
      color: #fecaca;
    }

    .data-quality-tip {
      background: #fef3c7;
      border: 1px solid #f59e0b;
      color: #92400e;
      padding: 0.5rem 1rem;
      border-radius: 2rem;
      font-size: 0.9rem;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
    }
  </style>
</head>
<body>
<div class="app-wrapper">
  <!-- SIDEBAR -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo-area">
        <div class="logo-icon"><i class="fa-regular fa-message"></i></div>
        <span class="logo-text">SalesFlow AI Pro</span>
      </div>
      <button class="collapse-btn" id="collapseSidebarBtn"><i class="fa-solid fa-chevron-left"></i></button>
    </div>
    <div class="sidebar-nav">
      <button class="nav-item active" id="nav-appointments"><i class="fa-regular fa-calendar-check"></i> <span>Appointments</span></button>
      <button class="nav-item" id="nav-analytics"><i class="fa-regular fa-chart-bar"></i> <span>Analytics</span> <span class="feature-tag">new</span></button>
      <button class="nav-item" id="nav-alerts"><i class="fa-regular fa-bell"></i> <span>Smart Alerts</span> <span class="feature-tag">beta</span></button>
      <button class="nav-item" id="nav-sources"><i class="fa-regular fa-star"></i> <span>Top Sources</span></button>
      <button class="nav-item" id="nav-noshow"><i class="fa-regular fa-clock"></i> <span>No‑show guard</span> <span class="feature-tag">+2</span></button>
      <button class="nav-item" id="nav-audit"><i class="fa-regular fa-clock"></i> <span>Audit Trail</span> <span class="feature-tag">new</span></button>
    </div>
    <div style="margin-top: auto; padding:1rem 0.5rem; color:#94a3b8; font-size:0.85rem;" id="trustScoreIndicator">
      <i class="fa-regular fa-circle-check" style="color:#22c55e;"></i> <span>Trust Score: 100%</span>
    </div>
  </div>

  <!-- MAIN PANEL -->
  <div class="main-panel">
    <div class="main-header">
      <h1 id="page-title"><i class="fas fa-chart-line" style="color:#f97316;"></i> Trusted Commission Hub</h1>
      <div class="theme-toggle" id="themeToggle"><i class="fa-regular fa-sun"></i><i class="fa-regular fa-moon"></i></div>
    </div>

    <!-- Dynamic page content -->
    <div id="page-content-container" class="page-content"></div>
  </div>
</div>

<!-- MODAL -->
<div class="modal" id="appointmentModal">
  <div class="modal-content">
    <div class="modal-header" style="display:flex; justify-content:space-between; align-items:center;">
      <h2 id="modalTitle">Add Appointment</h2>
      <button class="close-modal" id="closeModalBtn" style="background:none; border:none; font-size:2rem; cursor:pointer;">&times;</button>
    </div>
    <div id="validationMessage" class="validation-warning" style="display: none;"></div>
    <div class="form-group"><label>Client *</label><input id="client" placeholder="e.g. Acme Corp"></div>
    <div class="form-group"><label>Date *</label><input type="date" id="date"></div>
    <div class="form-group"><label>Industry</label><select id="industry"><option value="">Select</option><option>Construction</option><option>Healthcare</option><option>Ecommerce</option><option>Real Estate</option><option>Marketing</option></select></div>
    <div class="form-group"><label>Source (SAT only counts for commission)</label><select id="source"><option value="">Select</option><option>Cold Call</option><option>LinkedIn</option><option>SAT</option><option>Email</option><option>Referral</option></select></div>
    <div class="form-group"><label>Status</label><select id="status"><option value="Pending">⏳ Pending</option><option value="Confirmed">✅ Confirmed</option><option value="Cancelled">❌ Cancelled</option></select></div>
    <div class="form-group"><label>CRM Link</label><input id="crm" placeholder="https://..."></div>
    <div class="form-group">
      <label>Notes <span class="insight-chip" id="insightHint"><i class="fa-regular fa-lightbulb"></i> AI insight ready</span></label>
      <textarea id="notes" placeholder="Enter notes... (multi-line supported)"></textarea>
    </div>
    <div class="modal-actions" style="display:flex; justify-content:flex-end; gap:1rem; margin-top:1.5rem;">
      <button class="btn-secondary" id="cancelModalBtn">Cancel</button>
      <button class="btn-primary" onclick="saveAppointment()">Save</button>
    </div>
  </div>
</div>

<!-- Audit History Modal -->
<div class="modal" id="auditModal">
  <div class="modal-content">
    <div class="modal-header" style="display:flex; justify-content:space-between; align-items:center;">
      <h2>Appointment History</h2>
      <button class="close-modal" id="closeAuditModalBtn" style="background:none; border:none; font-size:2rem; cursor:pointer;">&times;</button>
    </div>
    <div id="auditHistoryContent"></div>
  </div>
</div>

<div class="toast" id="toast"><i class="fa-regular fa-circle-check"></i><span id="toastMessage">Saved</span></div>

<script>
  (function() {
    const body = document.body;
    const themeToggle = document.getElementById('themeToggle');
    if (localStorage.getItem('darkMode') === 'true') body.classList.add('dark');
    themeToggle.addEventListener('click', () => {
      body.classList.toggle('dark');
      localStorage.setItem('darkMode', body.classList.contains('dark'));
    });

    const sidebar = document.getElementById('sidebar');
    const collapseBtn = document.getElementById('collapseSidebarBtn');
    collapseBtn.addEventListener('click', () => {
      sidebar.classList.toggle('collapsed');
      const icon = collapseBtn.querySelector('i');
      icon.classList.toggle('fa-chevron-left');
      icon.classList.toggle('fa-chevron-right');
    });
  })();

  // --- ENHANCED COMMISSION LOGIC ---
  function getSATCountThisMonth() {
    const today = new Date();
    const currentMonth = today.getMonth();
    const currentYear = today.getFullYear();
    
    return data.filter(item => {
      if (item.source !== 'SAT' || item.status !== 'Confirmed') return false;
      const itemDate = new Date(item.date);
      if (isNaN(itemDate.getTime())) return false;
      return itemDate.getMonth() === currentMonth && itemDate.getFullYear() === currentYear;
    }).length;
  }

  function computeCommission() {
    const satCount = getSATCountThisMonth();
    if (satCount >= 8) {

    }
    return 0;
  }

  function getCommissionBreakdown() {
    const satCount = getSATCountThisMonth();
    if (satCount < 8) {
      return `Need ${8 - satCount} more SAT confirmations to earn commission`;
    } else if (satCount < 12) {
      return `${satCount} × 750 = ${satCount * 750} PHP (Base rate)`;
    } else if (satCount < 20) {
      return `${satCount} × 750 = ${satCount * 750} PHP (Achieved tier 2)`;
    } else {
      return `${satCount} × 750 = ${satCount * 750} PHP (Maximum tier)`;
    }
  }

  // --- TRUST SCORE CALCULATION ---
  function calculateTrustScore() {
    if (data.length === 0) return 100;
    
    let score = 100;
    let issues = [];
    
    data.forEach(item => {
      // Check for missing data
      if (!item.client) score -= 2;
      if (!item.date) score -= 2;
      if (!item.source) score -= 1;
      if (!item.status) score -= 2;
      
      // Check date validity
      const date = new Date(item.date);
      if (isNaN(date.getTime())) score -= 5;
      
      // Check for inconsistencies
      if (item.source === 'SAT' && item.status === 'Confirmed' && !item.verified) {
        score -= 3;
        issues.push('Unverified SAT sources');
      }
      
      // Check CRM link format
      if (item.crm && !item.crm.startsWith('http')) {
        score -= 1;
      }
    });
    
    // Check for duplicate appointments
    const seen = new Set();
    data.forEach(item => {
      const key = `${item.client}-${item.date}`;
      if (seen.has(key)) score -= 5;
      seen.add(key);
    });
    
    // Update trust score indicator
    const trustEl = document.getElementById('trustScoreIndicator');
    if (trustEl) {
      let trustClass = '';
      if (score >= 90) trustClass = '#22c55e';
      else if (score >= 70) trustClass = '#f97316';
      else trustClass = '#ef4444';
      
      trustEl.innerHTML = `<i class="fa-regular fa-circle-check" style="color:${trustClass};"></i> <span>Trust Score: ${Math.max(0, score)}%</span>`;
    }
    
    return { score: Math.max(0, score), issues };
  }

  function updateTrustScore() {
    calculateTrustScore();
  }

  // Other helper functions
  function getStats() {
    const today = new Date();
    let week = 0, month = 0, year = 0;
    const currentWeek = getWeekNumber(today);
    data.forEach(a => {
      const d = new Date(a.date);
      if (isNaN(d)) return;
      if (d.getFullYear() === today.getFullYear()) year++;
      if (d.getMonth() === today.getMonth() && d.getFullYear() === today.getFullYear()) month++;
      if (d.getFullYear() === today.getFullYear() && getWeekNumber(d) === currentWeek) week++;
    });
    return { week, month, year };
  }
  
  function getWeekNumber(d) {
    const firstJan = new Date(d.getFullYear(), 0, 1);
    return Math.ceil((((d - firstJan) / 86400000) + firstJan.getDay() + 1) / 7);
  }

  function getTopSource() {
    const sources = data.map(d => d.source).filter(Boolean);
    if (!sources.length) return '-';
    const freq = sources.reduce((acc, s) => { acc[s] = (acc[s] || 0) + 1; return acc; }, {});
    return Object.keys(freq).reduce((a, b) => freq[a] > freq[b] ? a : b);
  }

  function calculateStreak() {
    const confirmed = data.filter(a => a.status === 'Confirmed')
      .map(a => new Date(a.date).toDateString())
      .filter((v,i,s) => s.indexOf(v) === i)
      .sort((a,b) => new Date(a) - new Date(b));
    if (!confirmed.length) return 0;
    let max = 1, cur = 1;
    for (let i = 1; i < confirmed.length; i++) {
      const prev = new Date(confirmed[i-1]), curr = new Date(confirmed[i]);
      const diff = (curr - prev) / (1000*3600*24);
      if (diff === 1) cur++; else { max = Math.max(max, cur); cur = 1; }
    }
    return Math.max(max, cur);
  }

  function getMonthlyData() {
    const months = new Array(12).fill(0);
    data.forEach(a => {
      const d = new Date(a.date);
      if (!isNaN(d)) months[d.getMonth()]++;
    });
    return months;
  }

        document.querySelectorAll('#filterGroup button').forEach(b => b.classList.remove('active-filter'));
        this.classList.add('active-filter');
        currentFilter = this.dataset.filter;
        renderAppointmentsPage();
      });
    });

    document.getElementById('openAddModalBtn').addEventListener('click', () => {
      clearForm();
      editId = null;
      document.getElementById('modalTitle').innerText = 'Add Appointment';
      modal.classList.add('active');
    });
  }

  function renderAnalyticsPage() {
    const monthlyData = getMonthlyData();
    const total = data.length;
    const confirmed = data.filter(d => d.status === 'Confirmed').length;
    const pending = data.filter(d => d.status === 'Pending').length;
    const cancelled = data.filter(d => d.status === 'Cancelled').length;
    const satConfirmed = getSATCountThisMonth();
    const satTotal = data.filter(d => d.source === 'SAT').length;
    const trustScore = calculateTrustScore();

    const html = `
      <div class="trust-score">
        <h3><i class="fa-regular fa-shield"></i> Data Trust Score: ${trustScore.score}%</h3>
        <div class="trust-meter">
          <div class="trust-fill" style="width: ${trustScore.score}%;"></div>
        </div>
        ${trustScore.issues.length > 0 ? 
          `<p><i class="fa-regular fa-circle-exclamation"></i> Issues: ${trustScore.issues.join(', ')}</p>` : 
          '<p><i class="fa-regular fa-circle-check"></i> All data is reliable</p>'
        }
      </div>
      <div class="analytics-grid" style="display:grid; grid-template-columns:repeat(3,1fr); gap:1.5rem;">
        <div class="analytics-card"><h3>Total</h3><div class="value">${total}</div></div>
        <div class="analytics-card"><h3>Confirmed</h3><div class="value">${confirmed}</div></div>
        <div class="analytics-card"><h3>Pending</h3><div class="value">${pending}</div></div>
        <div class="analytics-card"><h3>Cancelled</h3><div class="value">${cancelled}</div></div>
        <div class="analytics-card"><h3>SAT this month</h3><div class="value">${satConfirmed}</div></div>
        <div class="analytics-card"><h3>Total SAT</h3><div class="value">${satTotal}</div></div>
      </div>
      <div class="chart-container">
        <canvas id="analyticsChart" style="height:250px; width:100%;"></canvas>
      </div>
    `;

    pageContainer.innerHTML = html;
    pageTitle.innerHTML = '<i class="fa-regular fa-chart-bar" style="color:#f97316;"></i> Analytics & Trust Metrics';

    const canvas = document.getElementById('analyticsChart');
    if (canvas) {
      if (analyticsChart) analyticsChart.destroy();
      canvas.style.height = '250px';
      canvas.style.width = '100%';
      analyticsChart = new Chart(canvas, {
        type: 'bar',
        data: {
          labels: ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"],
          datasets: [{
            label: "Appointments",
            data: monthlyData,
            backgroundColor: "#f97316",
            borderRadius: 6
          }]
        },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true } } }
      });
    }
  }

  function renderAlertsPage() {
    const upcoming = data.filter(a => new Date(a.date) > new Date() && a.status !== 'Confirmed').length;
    const unverifiedSAT = data.filter(a => a.source === 'SAT' && !a.verified).length;
    
    pageContainer.innerHTML = `
      <div style="padding:2rem; text-align:center;">
        <i class="fa-regular fa-bell" style="font-size:4rem; color:#f97316;"></i>
        <h2 style="margin:1rem 0;">Smart Alerts</h2>
        <div class="analytics-card" style="max-width:300px; margin:0 auto 1rem;">
          <h3>Upcoming non‑confirmed</h3>
          <div class="value">${upcoming}</div>
        </div>
        <div class="analytics-card" style="max-width:300px; margin:0 auto;">
          <h3>Unverified SAT sources</h3>
          <div class="value">${unverifiedSAT}</div>
        </div>
      </div>`;
    pageTitle.innerHTML = '<i class="fa-regular fa-bell"></i> Smart Alerts';
  }

  function renderSourcesPage() {
    const freq = {};
    data.forEach(d => { if (d.source) freq[d.source] = (freq[d.source] || 0) + 1; });
    const entries = Object.entries(freq).sort((a,b)=>b[1]-a[1]);
    pageContainer.innerHTML = `
      <div style="padding:2rem;">
        <h2 style="margin-bottom:1.5rem;">Top Lead Sources</h2>
        ${entries.map(([s,c]) => `
          <div style="background:white; margin:0.5rem 0; padding:1rem 1.5rem; border-radius:3rem; display:flex; justify-content:space-between; border:1px solid #edf2f7;">
            <span>${s}</span> <strong>${c}</strong>
          </div>
        `).join('')}
      </div>`;
    pageTitle.innerHTML = '<i class="fa-regular fa-star"></i> Top Sources';
  }

  function renderNoshowPage() {
    const noshows = data.filter(d => d.status === 'Pending');
    pageContainer.innerHTML = `
      <div style="padding:2rem;">
        <h2 style="margin-bottom:1.5rem;">No‑show guard (Pending)</h2>
        ${noshows.length ? noshows.map(n => `
          <div style="background:white; padding:1rem 1.5rem; border-radius:3rem; margin:0.5rem 0; border:1px solid #edf2f7;">
            🔸 ${n.client} — ${n.date} ${n.notes ? '· ' + n.notes : ''}
          </div>
        `).join('') : '<p class="analytics-card" style="text-align:center;">All clear, no pending.</p>'}
      </div>`;
    pageTitle.innerHTML = '<i class="fa-regular fa-clock"></i> No‑show guard';
  }

  function renderAuditPage() {
    pageContainer.innerHTML = `
      <div style="padding:1rem;">
        <h2 style="margin-bottom:1.5rem;">Audit Trail</h2>
        <div class="audit-trail">
          ${auditLog.length === 0 ? '<p>No audit entries yet</p>' : ''}
          ${auditLog.slice(0, 50).map(entry => {
            const date = new Date(entry.timestamp);
            return `
              <div class="audit-entry">
                <span class="audit-time">${date.toLocaleString()}</span>
                <span><strong>${entry.action}</strong></span>
                <span>${entry.details}</span>
              </div>
            `;
          }).join('')}
        </div>
        <button class="btn-secondary" onclick="exportAuditLog()" style="margin-top:1rem;">
          <i class="fa-regular fa-file-excel"></i> Export Audit Log
        </button>
      </div>
    `;
    pageTitle.innerHTML = '<i class="fa-regular fa-clock"></i> Audit Trail';
  }

  function renderCurrentPage() {
    if (currentPage === 'appointments') renderAppointmentsPage();
    else if (currentPage === 'analytics') renderAnalyticsPage();
    else if (currentPage === 'alerts') renderAlertsPage();
    else if (currentPage === 'sources') renderSourcesPage();
    else if (currentPage === 'noshow') renderNoshowPage();
    else if (currentPage === 'audit') renderAuditPage();
    
    // Log commission status for debugging
    console.log('Current month SAT confirmed:', getSATCountThisMonth());
    console.log('Commission:', computeCommission());
  }

  function setActiveNav(page) {
    document.querySelectorAll('.nav-item').forEach(btn => btn.classList.remove('active'));
    document.getElementById(`nav-${page}`).classList.add('active');
    currentPage = page;
    renderCurrentPage();
  }

  document.getElementById('nav-appointments').addEventListener('click', ()=> setActiveNav('appointments'));
  document.getElementById('nav-analytics').addEventListener('click', ()=> setActiveNav('analytics'));
  document.getElementById('nav-alerts').addEventListener('click', ()=> setActiveNav('alerts'));
  document.getElementById('nav-sources').addEventListener('click', ()=> setActiveNav('sources'));
  document.getElementById('nav-noshow').addEventListener('click', ()=> setActiveNav('noshow'));
  document.getElementById('nav-audit').addEventListener('click', ()=> setActiveNav('audit'));

  window.exportCSV = () => {
    const csv = "Client,Date,Industry,Source,Status,CRM,Notes,Verified\n" + 
      data.map(a => `${a.client},${a.date},${a.industry},${a.source},${a.status},${a.crm},${a.notes},${a.verified}`).join('\n');
    const blob = new Blob([csv], {type:'text/csv'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = "appointments.csv";
    a.click();
    addAuditEntry('EXPORT', 'Exported data to CSV');
    showToast("CSV exported");
  };

  window.exportAuditLog = () => {
    const csv = "Timestamp,Action,Details,Appointment ID\n" + 
      auditLog.map(a => `${a.timestamp},${a.action},${a.details},${a.appointmentId || ''}`).join('\n');
    const blob = new Blob([csv], {type:'text/csv'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = "audit_log.csv";
    a.click();
    showToast("Audit log exported");
  };

  window.clearFilter = () => {
    currentFilter = "all";
    if (currentPage === 'appointments') renderAppointmentsPage();
  };

  // Initialize
  setActiveNav('appointments');
  updateTrustScore();
  
  // Test commission logic on load
  console.log('=== COMMISSION LOGIC TEST ===');
  console.log(`SAT Confirmed this month: ${getSATCountThisMonth()}`);
  console.log(`Commission: ${computeCommission()} PHP`);
  console.log(`Breakdown: ${getCommissionBreakdown()}`);
  console.log('============================');
</script>
</body>

    /* quick stats dashboard */

    /* intelligent notes insight */

      background:#f1f5f9; border-radius:2rem; padding:0.3rem 1rem; font-size:0.85rem; display:inline-flex; align-items:center; gap:0.3rem; border:1px dashed #f97316;
      cursor: pointer;
    }

    /* SAT badge highlight */
    .sat-badge {

    .sat-badge.verified::after {
      content: "✓ Verified";
      position: absolute;
      bottom: 100%;
      left: 50%;
      transform: translateX(-50%);
      background: #1e293b;
      color: white;
      padding: 0.2rem 0.5rem;
      border-radius: 1rem;
      font-size: 0.7rem;
      white-space: nowrap;

    }
    .sat-badge.verified:hover::after {
      display: block;

    /* Audit trail */

      margin-top: 2rem;

    /* Trust score */

    /* Validation warning */

      padding: 0.5rem 1rem;

<body>
<div class="app-wrapper">

<!-- Audit History Modal -->

      <button class="close-modal" id="closeAuditModalBtn" style="background:none; border:none; font-size:2rem; cursor:pointer;">&times;</button>

  </div>

<div class="toast" id="toast"><i class="fa-regular fa-circle-check"></i><span id="toastMessage">Saved</span></div>

<script>
  (function() {
    const body = document.body;
    const themeToggle = document.getElementById('themeToggle');
    if (localStorage.getItem('darkMode') === 'true') body.classList.add('dark');
    themeToggle.addEventListener('click', () => {
      body.classList.toggle('dark');
      localStorage.setItem('darkMode', body.classList.contains('dark'));
    });

    const sidebar = document.getElementById('sidebar');
    const collapseBtn = document.getElementById('collapseSidebarBtn');
    collapseBtn.addEventListener('click', () => {
      sidebar.classList.toggle('collapsed');
      const icon = collapseBtn.querySelector('i');
      icon.classList.toggle('fa-chevron-left');
      icon.classList.toggle('fa-chevron-right');
    });
  })();

  // --- CENTRALIZED STATUS CONFIG ---
  const STATUS_CONFIG = {
    'Pending': { color: '#f97316', label: '⏳ Pending', icon: 'fa-regular fa-clock' },
    'Confirmed': { color: '#22c55e', label: '✅ Confirmed', icon: 'fa-regular fa-circle-check' },
    'Cancelled': { color: '#ef4444', label: '❌ Cancelled', icon: 'fa-regular fa-circle-xmark' }
  };

  // --- AUDIT TRAIL ---
  let auditLog = JSON.parse(localStorage.getItem("auditLog")) || [];

  function addAuditEntry(action, details, appointmentId = null) {
    const entry = {
      id: crypto.randomUUID ? crypto.randomUUID() : Date.now() + '-' + Math.random().toString(36).substr(2,9),
      timestamp: new Date().toISOString(),
      action: action,
      details: details,
      appointmentId: appointmentId,
      user: 'Current User' // In real app, this would be actual user
    };
    auditLog.unshift(entry); // Most recent first
    // Keep only last 100 entries
    if (auditLog.length > 100) auditLog = auditLog.slice(0, 100);
    localStorage.setItem("auditLog", JSON.stringify(auditLog));
  }

  // --- DATA MANAGEMENT ---
  let data = JSON.parse(localStorage.getItem("appointments")) || [];
  
  // Initialize with test data if empty
  if (data.length === 0) {
    const today = new Date();
    const year = today.getFullYear();
    const month = String(today.getMonth() + 1).padStart(2, '0');
    
    data = [
      {
        id: crypto.randomUUID ? crypto.randomUUID() : '1',
        client: 'ABC Construction',
        date: `${year}-${month}-15`,
        industry: 'Construction',
        source: 'SAT',
        status: 'Confirmed',
        crm: '',
        notes: 'Interested in premium package',
        verified: true
      },
      {
        id: crypto.randomUUID ? crypto.randomUUID() : '2',
        client: 'XYZ Marketing',
        date: `${year}-${month}-10`,
        industry: 'Marketing',
        source: 'SAT',
        status: 'Confirmed',
        crm: '',
        notes: 'Follow up next week',
        verified: true
      },
      {
        id: crypto.randomUUID ? crypto.randomUUID() : '3',
        client: '123 Healthcare',
        date: `${year}-${month}-05`,
        industry: 'Healthcare',
        source: 'SAT',
        status: 'Pending',
        crm: '',
        notes: 'Waiting for approval',
        verified: false
      },
      {
        id: crypto.randomUUID ? crypto.randomUUID() : '4',
        client: 'TechStart Inc',
        date: `${year}-${month}-20`,
        industry: 'Ecommerce',
        source: 'LinkedIn',
        status: 'Confirmed',
        crm: '',
        notes: 'Demo scheduled',
        verified: false
      }
    ];
    
    // Add audit entries for initial data
    data.forEach(item => {
      addAuditEntry('CREATE', `Created appointment for ${item.client}`, item.id);
    });
    saveData();
  }

  data = data.map(item => {
    if (!item.id) {
      item.id = crypto.randomUUID ? crypto.randomUUID() : Date.now() + '-' + Math.random().toString(36).substr(2,9);
    }
    if (!item.status || !STATUS_CONFIG[item.status]) item.status = 'Pending';
    if (!item.source) item.source = '';
    if (item.verified === undefined) item.verified = item.source === 'SAT' ? true : false;
    return item;
  });
  saveData();

  let editId = null;
  let currentFilter = "all";
  let currentPage = "appointments";
  let analyticsChart = null;

  const modal = document.getElementById('appointmentModal');
  const auditModal = document.getElementById('auditModal');
  const closeModalBtn = document.getElementById('closeModalBtn');
  const cancelModalBtn = document.getElementById('cancelModalBtn');
  const closeAuditModalBtn = document.getElementById('closeAuditModalBtn');
  const toast = document.getElementById('toast');
  const toastMessage = document.getElementById('toastMessage');
  const pageContainer = document.getElementById('page-content-container');
  const pageTitle = document.getElementById('page-title');
  const insightHint = document.getElementById('insightHint');
  const validationMessage = document.getElementById('validationMessage');

  function showToast(msg) { 
    toastMessage.innerText = msg; 
    toast.classList.add('show'); 
    setTimeout(() => toast.classList.remove('show'), 2500); 
  }
  
  function saveData() { 
    localStorage.setItem("appointments", JSON.stringify(data)); 
    updateTrustScore();
  }

  closeModalBtn.addEventListener('click', () => modal.classList.remove('active'));
  cancelModalBtn.addEventListener('click', () => modal.classList.remove('active'));
  modal.addEventListener('click', (e) => e.target === modal && modal.classList.remove('active'));
  
  closeAuditModalBtn.addEventListener('click', () => auditModal.classList.remove('active'));
  auditModal.addEventListener('click', (e) => e.target === auditModal && auditModal.classList.remove('active'));

  // Data quality check function
  function validateAppointmentData(client, date, source) {
    const warnings = [];
    
    if (!client || client.trim().length < 2) {
      warnings.push("Client name must be at least 2 characters");
    }
    
    if (!date) {
      warnings.push("Date is required");
    } else {
      const selectedDate = new Date(date);
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      
      // Check for duplicate appointments (same client and date)
      const duplicate = data.find(item => 
        item.client.toLowerCase() === client.toLowerCase() && 
        item.date === date &&
        item.id !== editId
      );
      
      if (duplicate) {
        warnings.push("An appointment with this client already exists on this date");
      }
    }
    
    if (source === 'SAT' && !editId) {
      // Check if SAT source is being used appropriately
      const satCount = data.filter(item => item.source === 'SAT').length;
      if (satCount > 50) {
        warnings.push("Unusually high number of SAT sources detected");
      }
    }
    
    return warnings;
  }

  // Insight hint functionality
  insightHint?.addEventListener('click', function() {
    const notesField = document.getElementById('notes');
    let text = notesField.value.trim();
    if (!text) {
      notesField.value = "✨ no notes to analyze";
      return;
    }
    const words = text.split(/\s+/).length;
    const hasPhone = (text.includes('+') || text.includes('09')) ? '📞 contact' : '';
    const hasEmail = text.includes('@') ? '📧 email' : '';
    const followUp = text.toLowerCase().includes('follow') ? '🔄 follow-up needed' : '';
    const insight = [hasPhone, hasEmail, followUp, `📝 ${words} words`].filter(Boolean).join(' · ');
    notesField.value = text + `\n(insight: ${insight})`;
    showToast('insight added');
  });

  function clearForm() {
    document.getElementById("client").value = "";
    document.getElementById("date").value = "";
    document.getElementById("industry").value = "";
    document.getElementById("source").value = "";
    document.getElementById("status").value = "Pending";
    document.getElementById("crm").value = "";
    document.getElementById("notes").value = "";
    validationMessage.style.display = 'none';
  }

  window.saveAppointment = function() {
    let client = document.getElementById("client").value.trim();
    let date = document.getElementById("date").value;
    let source = document.getElementById("source").value;
    
    // Validate data
    const warnings = validateAppointmentData(client, date, source);
    if (warnings.length > 0) {
      validationMessage.innerHTML = '<i class="fa-regular fa-circle-exclamation"></i> ' + warnings.join('<br>');
      validationMessage.style.display = 'block';
      return;
    }
    
    if (!client || !date) { 
      validationMessage.innerHTML = '<i class="fa-regular fa-circle-exclamation"></i> Client and Date are required!';
      validationMessage.style.display = 'block';
      return; 
    }
    
    let obj = {
      id: editId || (crypto.randomUUID ? crypto.randomUUID() : Date.now()+'-'+Math.random().toString(36).substr(2,9)),
      client, date,
      industry: document.getElementById("industry").value,
      source: source,
      status: document.getElementById("status").value,
      crm: document.getElementById("crm").value.trim(),
      notes: document.getElementById("notes").value.trim(),
      verified: source === 'SAT' // Auto-verify SAT sources
    };
    
    if (editId) {
      let idx = data.findIndex(i => i.id === editId);
      if (idx >= 0) {
        let oldData = {...data[idx]};
        data[idx] = obj;
        addAuditEntry('UPDATE', `Updated appointment for ${client}`, editId);
        showToast("Updated");
      }
    } else {
      data.push(obj);
      addAuditEntry('CREATE', `Created new appointment for ${client}`, obj.id);
      showToast("Added");
    }
    saveData();
    modal.classList.remove('active');
    renderCurrentPage();
  };

  window.editAppointment = (id) => {
    let item = data.find(a => a.id === id);
    if (!item) return;
    document.getElementById("client").value = item.client || "";
    document.getElementById("date").value = item.date || "";
    document.getElementById("industry").value = item.industry || "";
    document.getElementById("source").value = item.source || "";
    document.getElementById("status").value = item.status || "Pending";
    document.getElementById("crm").value = item.crm || "";
    document.getElementById("notes").value = item.notes || "";
    editId = id;
    document.getElementById('modalTitle').innerText = 'Edit Appointment';
    validationMessage.style.display = 'none';
    modal.classList.add('active');
  };

  window.deleteAppointment = (id) => {
    if (confirm("Delete this appointment?")) {
      let item = data.find(i => i.id === id);
      data = data.filter(i => i.id !== id);
      if (item) {
        addAuditEntry('DELETE', `Deleted appointment for ${item.client}`, id);
      }
      saveData();
      if (editId === id) editId = null;
      renderCurrentPage();
      showToast("Deleted");
    }
  };

  window.viewHistory = (id) => {
    const item = data.find(a => a.id === id);
    const history = auditLog.filter(entry => entry.appointmentId === id);
    
    let html = `<h3>History for ${item ? item.client : 'Appointment'}</h3>`;
    if (history.length === 0) {
      html += '<p>No history available</p>';
    } else {
      html += '<div class="audit-trail">';
      history.forEach(entry => {
        const date = new Date(entry.timestamp);
        html += `
          <div class="audit-entry">
            <span class="audit-time">${date.toLocaleString()}</span>
            <span><strong>${entry.action}</strong></span>
            <span>${entry.details}</span>
          </div>
        `;
      });
      html += '</div>';
    }
    
    document.getElementById('auditHistoryContent').innerHTML = html;
    auditModal.classList.add('active');
  };

  window.verifySource = (id) => {
    const item = data.find(a => a.id === id);
    if (item) {
      item.verified = !item.verified;
      addAuditEntry('VERIFY', `${item.verified ? 'Verified' : 'Unverified'} source for ${item.client}`, id);
      saveData();
      renderCurrentPage();
      showToast(`Source ${item.verified ? 'verified' : 'unverified'}`);
    }
  };

  // --- ENHANCED COMMISSION LOGIC ---
  function getSATCountThisMonth() {
    const today = new Date();
    const currentMonth = today.getMonth();
    const currentYear = today.getFullYear();
    
    return data.filter(item => {
      if (item.source !== 'SAT' || item.status !== 'Confirmed') return false;
      const itemDate = new Date(item.date);
      if (isNaN(itemDate.getTime())) return false;
      return itemDate.getMonth() === currentMonth && itemDate.getFullYear() === currentYear;
    }).length;
  }

  function computeCommission() {
    const satCount = getSATCountThisMonth();
    if (satCount >= 8) {
      return satCount * 750;
    }
    return 0;
  }

  function getCommissionBreakdown() {
    const satCount = getSATCountThisMonth();
    if (satCount < 8) {
      return `Need ${8 - satCount} more SAT confirmations to earn commission`;
    } else if (satCount < 12) {
      return `${satCount} × 750 = ${satCount * 750} PHP (Base rate)`;
    } else if (satCount < 20) {
      return `${satCount} × 750 = ${satCount * 750} PHP (Achieved tier 2)`;
    } else {
      return `${satCount} × 750 = ${satCount * 750} PHP (Maximum tier)`;
    }
  }

  // --- TRUST SCORE CALCULATION ---
  function calculateTrustScore() {
    if (data.length === 0) return 100;
    
    let score = 100;
    let issues = [];
    
    data.forEach(item => {
      // Check for missing data
      if (!item.client) score -= 2;
      if (!item.date) score -= 2;
      if (!item.source) score -= 1;
      if (!item.status) score -= 2;
      
      // Check date validity
      const date = new Date(item.date);
      if (isNaN(date.getTime())) score -= 5;
      
      // Check for inconsistencies
      if (item.source === 'SAT' && item.status === 'Confirmed' && !item.verified) {
        score -= 3;
        issues.push('Unverified SAT sources');
      }
      
      // Check CRM link format
      if (item.crm && !item.crm.startsWith('http')) {
        score -= 1;
      }
    });
    
    // Check for duplicate appointments
    const seen = new Set();
    data.forEach(item => {
      const key = `${item.client}-${item.date}`;
      if (seen.has(key)) score -= 5;
      seen.add(key);
    });
    
    // Update trust score indicator
    const trustEl = document.getElementById('trustScoreIndicator');
    if (trustEl) {
      let trustClass = '';
      if (score >= 90) trustClass = '#22c55e';
      else if (score >= 70) trustClass = '#f97316';
      else trustClass = '#ef4444';
      
      trustEl.innerHTML = `<i class="fa-regular fa-circle-check" style="color:${trustClass};"></i> <span>Trust Score: ${Math.max(0, score)}%</span>`;
    }
    
    return { score: Math.max(0, score), issues };
  }

  function updateTrustScore() {
    calculateTrustScore();
  }

  // Other helper functions
  function getStats() {
    const today = new Date();
    let week = 0, month = 0, year = 0;
    const currentWeek = getWeekNumber(today);
    data.forEach(a => {
      const d = new Date(a.date);
      if (isNaN(d)) return;
      if (d.getFullYear() === today.getFullYear()) year++;
      if (d.getMonth() === today.getMonth() && d.getFullYear() === today.getFullYear()) month++;
      if (d.getFullYear() === today.getFullYear() && getWeekNumber(d) === currentWeek) week++;
    });
    return { week, month, year };
  }
  
  function getWeekNumber(d) {
    const firstJan = new Date(d.getFullYear(), 0, 1);
    return Math.ceil((((d - firstJan) / 86400000) + firstJan.getDay() + 1) / 7);
  }

  function getTopSource() {
    const sources = data.map(d => d.source).filter(Boolean);
    if (!sources.length) return '-';
    const freq = sources.reduce((acc, s) => { acc[s] = (acc[s] || 0) + 1; return acc; }, {});
    return Object.keys(freq).reduce((a, b) => freq[a] > freq[b] ? a : b);
  }

  function calculateStreak() {
    const confirmed = data.filter(a => a.status === 'Confirmed')
      .map(a => new Date(a.date).toDateString())
      .filter((v,i,s) => s.indexOf(v) === i)
      .sort((a,b) => new Date(a) - new Date(b));
    if (!confirmed.length) return 0;
    let max = 1, cur = 1;
    for (let i = 1; i < confirmed.length; i++) {
      const prev = new Date(confirmed[i-1]), curr = new Date(confirmed[i]);
      const diff = (curr - prev) / (1000*3600*24);
      if (diff === 1) cur++; else { max = Math.max(max, cur); cur = 1; }
    }
    return Math.max(max, cur);
  }

  function getMonthlyData() {
    const months = new Array(12).fill(0);
    data.forEach(a => {
      const d = new Date(a.date);
      if (!isNaN(d)) months[d.getMonth()]++;
    });
    return months;
  }

  // --- RENDER FUNCTIONS ---
  function renderStatsDashboard() {
    const satConfirmed = getSATCountThisMonth();
    const totalMonth = data.filter(d => {
      const date = new Date(d.date);
      return !isNaN(date) && date.getMonth() === new Date().getMonth();
    }).length;
    const pendingCount = data.filter(d => d.status === 'Pending').length;
    const cancelledCount = data.filter(d => d.status === 'Cancelled').length;
    const trustScore = calculateTrustScore();
    
    let qualityTip = '';
    if (trustScore.score < 80) {
      qualityTip = '<div class="data-quality-tip"><i class="fa-regular fa-circle-exclamation"></i> Some data needs attention</div>';
    }
    
    return `
      ${qualityTip}
      <div class="stats-dashboard">
        <div class="stat-tile"><i class="fa-regular fa-calendar"></i><div class="stat-number">${totalMonth}</div><span>month total</span></div>
        <div class="stat-tile"><i class="fa-regular fa-clock" style="color:#f97316;"></i><div class="stat-number">${pendingCount}</div><span>pending</span></div>
        <div class="stat-tile"><i class="fa-regular fa-circle-xmark" style="color:#ef4444;"></i><div class="stat-number">${cancelledCount}</div><span>cancelled</span></div>
        <div class="stat-tile"><i class="fa-regular fa-star" style="color:#22c55e;"></i><div class="stat-number">${satConfirmed}</div><span>SAT confirmed</span></div>
      </div>
    `;
  }

  window.updateStatusFromDropdown = (appId, newStatus) => {
    const app = data.find(a => a.id === appId);
    if (app) {
      let oldStatus = app.status;
      app.status = newStatus;
      addAuditEntry('STATUS_CHANGE', `Changed status from ${oldStatus} to ${newStatus} for ${app.client}`, appId);
      saveData();
      renderCurrentPage();
      showToast(`Status → ${newStatus}`);
      
      // Test commission logic
      console.log('Commission update:', {
        satCount: getSATCountThisMonth(),
        commission: computeCommission(),
        breakdown: getCommissionBreakdown()
      });
    }
  };

  window.toggleDropdown = (id) => {
    document.querySelectorAll('.status-dropdown-menu').forEach(m => { if (m.id !== id) m.classList.remove('show'); });
    const menu = document.getElementById(id);
    if (menu) menu.classList.toggle('show');
  };
  
  document.addEventListener('click', (e) => {
    if (!e.target.closest('.status-dropdown-container')) {
      document.querySelectorAll('.status-dropdown-menu').forEach(m => m.classList.remove('show'));
    }
  });

  function renderAppointmentsPage() {
    const filtered = currentFilter === "all" ? data : data.filter(a => a.status === currentFilter);
    const stats = getStats();
    const satThisMonth = getSATCountThisMonth();
    const commission = computeCommission();
    const progressPercent = Math.min((satThisMonth / 8) * 100, 100);
    const topSource = getTopSource();
    const streak = calculateStreak();
    const commissionEarned = satThisMonth >= 8;

    let tableRows = '';
    filtered.forEach(a => {
      const statusConf = STATUS_CONFIG[a.status] || STATUS_CONFIG['Pending'];
      const dotStyle = `background-color: ${statusConf.color};`;
      
      let sourceBadge = a.source || '-';
      if (a.source === 'SAT') {
        sourceBadge = `<span class="sat-badge ${a.verified ? 'verified' : ''}" onclick="verifySource('${a.id}')" style="cursor:pointer;">SAT ${a.verified ? '✓' : '?'}</span>`;
      }
      
      tableRows += `<tr>
        <td>
          <div class="status-dropdown-container">
            <button class="status-dropdown-btn" onclick="event.stopPropagation(); toggleDropdown('dropdown-${a.id}')">
              <span class="status-dot" style="${dotStyle}"></span> ${statusConf.label} <i class="fa-solid fa-chevron-down" style="font-size:0.7rem;"></i>
            </button>
            <div id="dropdown-${a.id}" class="status-dropdown-menu">
              ${Object.entries(STATUS_CONFIG).map(([key, val]) => `
                <div class="status-option" onclick="updateStatusFromDropdown('${a.id}','${key}'); event.stopPropagation();">
                  <span class="status-dot" style="background-color: ${val.color};"></span> ${val.label}
                </div>
              `).join('')}
            </div>
          </div>
        </td>
        <td>${a.client || ''}</td>
        <td>${a.date || ''}</td>
        <td>${a.industry || '-'}</td>
        <td>${sourceBadge}</td>
        <td>${a.crm ? `<a href="${a.crm}" target="_blank"><i class="fa-regular fa-link"></i> link</a>` : '-'}</td>
        <td>${a.notes ? (a.notes.length > 30 ? a.notes.substring(0,27)+'…' : a.notes) : ''}</td>
        <td>
          <button class="action-btn" onclick="editAppointment('${a.id}')" style="background:none; border:none; cursor:pointer;" title="Edit"><i class="fa-regular fa-pen-to-square"></i></button>
          <button class="action-btn" onclick="viewHistory('${a.id}')" style="background:none; border:none; cursor:pointer;" title="History"><i class="fa-regular fa-clock"></i></button>
          <button class="action-btn" onclick="deleteAppointment('${a.id}')" style="background:none; border:none; cursor:pointer;" title="Delete"><i class="fa-regular fa-trash-can"></i></button>
        </td>
      </tr>`;
    });

    const html = `
      ${renderStatsDashboard()}
      <div class="commission-panel ${commissionEarned ? 'commission-earned' : ''}">
        <div class="commission-left">
          <h3><i class="fas fa-circle-dollar-to-slot"></i> SAT commission</h3>
          <p>✅ Only SAT source + Confirmed status count</p>
          <p>🎯 Target: 8 SAT = 6,000 PHP | 12 SAT = 9,000 PHP | 20 SAT = 15,000 PHP</p>
        </div>
        <div class="commission-highlight" data-tooltip="${getCommissionBreakdown()}"><span>${commission} PHP</span><small>this month</small></div>
        <div class="progress-wrapper">
          <div class="progress-label" style="display:flex; justify-content:space-between; margin-bottom:0.3rem;">
            <span>✅ SAT confirmed</span>
            <span>${satThisMonth} / 8</span>
          </div>
          <div class="progress-bg">
            <div class="progress-fill ${commissionEarned ? 'earned' : ''}" style="width:${progressPercent}%;"></div>
          </div>
          ${commissionEarned ? 
            `<div style="margin-top:0.3rem; color:#22c55e; font-weight:600;">✓ Commission active: ${satThisMonth} × 750 PHP = ${commission} PHP</div>` : 
            `<div style="margin-top:0.3rem; color:#f97316; font-weight:600;">${8 - satThisMonth} more to earn commission</div>`
          }
        </div>
      </div>
      <div class="kpi-grid">
        <div class="kpi-item"><i class="fa-regular fa-calendar-check"></i><h2>${stats.week}</h2><p>this week</p></div>
        <div class="kpi-item"><i class="fa-regular fa-calendar"></i><h2>${stats.month}</h2><p>this month</p></div>
        <div class="kpi-item"><i class="fa-regular fa-calendar-plus"></i><h2>${stats.year}</h2><p>this year</p></div>
      </div>
      <div class="feature-bar">
        <div class="feature-badge"><i class="fa-regular fa-star"></i> top source: ${topSource}</div>
        <div class="feature-badge"><i class="fa-regular fa-fire"></i> streak: ${streak}</div>
        <div class="filter-group" id="filterGroup">
          <button class="${currentFilter==='all'?'active-filter':''}" data-filter="all">All</button>
          ${Object.keys(STATUS_CONFIG).map(s => `<button class="${currentFilter===s?'active-filter':''}" data-filter="${s}">${STATUS_CONFIG[s].label}</button>`).join('')}
        </div>
        <div class="action-button-group">
          <button class="btn-primary" id="openAddModalBtn"><i class="fa-solid fa-plus"></i> New</button>
          <button class="btn-secondary" onclick="exportCSV()"><i class="fa-regular fa-file-excel"></i> Export</button>
          <button class="btn-secondary" onclick="clearFilter()"><i class="fa-solid fa-filter-circle-xmark"></i> Clear</button>
        </div>
      </div>
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>status</th>
              <th>client</th>
              <th>date</th>
              <th>industry</th>
              <th>source</th>
              <th>crm</th>
              <th>notes</th>
              <th>actions</th>
            </tr>
          </thead>
          <tbody>
            ${tableRows || '<tr><td colspan="8" style="text-align:center; padding:2rem;">No appointments found</td></tr>'}
          </tbody>
        </table>
      </div>
    `;

    pageContainer.innerHTML = html;
    pageTitle.innerHTML = '<i class="fas fa-chart-line" style="color:#f97316;"></i> Trusted Commission Hub';

    document.querySelectorAll('#filterGroup button').forEach(btn => {
      btn.addEventListener('click', function(e) {
        document.querySelectorAll('#filterGroup button').forEach(b => b.classList.remove('active-filter'));
        this.classList.add('active-filter');
        currentFilter = this.dataset.filter;
        renderAppointmentsPage();
      });
    });

    document.getElementById('openAddModalBtn').addEventListener('click', () => {
      clearForm();
      editId = null;
      document.getElementById('modalTitle').innerText = 'Add Appointment';
      modal.classList.add('active');
    });
  }

  function renderAnalyticsPage() {
    const monthlyData = getMonthlyData();
    const total = data.length;
    const confirmed = data.filter(d => d.status === 'Confirmed').length;
    const pending = data.filter(d => d.status === 'Pending').length;
    const cancelled = data.filter(d => d.status === 'Cancelled').length;
    const satConfirmed = getSATCountThisMonth();
    const satTotal = data.filter(d => d.source === 'SAT').length;
    const trustScore = calculateTrustScore();

    const html = `
      <div class="trust-score">
        <h3><i class="fa-regular fa-shield"></i> Data Trust Score: ${trustScore.score}%</h3>
        <div class="trust-meter">
          <div class="trust-fill" style="width: ${trustScore.score}%;"></div>
        </div>
        ${trustScore.issues.length > 0 ? 
          `<p><i class="fa-regular fa-circle-exclamation"></i> Issues: ${trustScore.issues.join(', ')}</p>` : 
          '<p><i class="fa-regular fa-circle-check"></i> All data is reliable</p>'
        }
      </div>
      <div class="analytics-grid" style="display:grid; grid-template-columns:repeat(3,1fr); gap:1.5rem;">
        <div class="analytics-card"><h3>Total</h3><div class="value">${total}</div></div>
        <div class="analytics-card"><h3>Confirmed</h3><div class="value">${confirmed}</div></div>
        <div class="analytics-card"><h3>Pending</h3><div class="value">${pending}</div></div>
        <div class="analytics-card"><h3>Cancelled</h3><div class="value">${cancelled}</div></div>
        <div class="analytics-card"><h3>SAT this month</h3><div class="value">${satConfirmed}</div></div>
        <div class="analytics-card"><h3>Total SAT</h3><div class="value">${satTotal}</div></div>
      </div>
      <div class="chart-container">
        <canvas id="analyticsChart" style="height:250px; width:100%;"></canvas>
      </div>
    `;

    pageContainer.innerHTML = html;
    pageTitle.innerHTML = '<i class="fa-regular fa-chart-bar" style="color:#f97316;"></i> Analytics & Trust Metrics';

    const canvas = document.getElementById('analyticsChart');
    if (canvas) {
      if (analyticsChart) analyticsChart.destroy();
      canvas.style.height = '250px';
      canvas.style.width = '100%';
      analyticsChart = new Chart(canvas, {
        type: 'bar',
        data: {
          labels: ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"],
          datasets: [{
            label: "Appointments",
            data: monthlyData,
            backgroundColor: "#f97316",
            borderRadius: 6
          }]
        },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true } } }
      });
    }
  }

  function renderAlertsPage() {
    const upcoming = data.filter(a => new Date(a.date) > new Date() && a.status !== 'Confirmed').length;
    const unverifiedSAT = data.filter(a => a.source === 'SAT' && !a.verified).length;
    
    pageContainer.innerHTML = `
      <div style="padding:2rem; text-align:center;">
        <i class="fa-regular fa-bell" style="font-size:4rem; color:#f97316;"></i>
        <h2 style="margin:1rem 0;">Smart Alerts</h2>
        <div class="analytics-card" style="max-width:300px; margin:0 auto 1rem;">
          <h3>Upcoming non‑confirmed</h3>
          <div class="value">${upcoming}</div>
        </div>
        <div class="analytics-card" style="max-width:300px; margin:0 auto;">
          <h3>Unverified SAT sources</h3>
          <div class="value">${unverifiedSAT}</div>
        </div>
      </div>`;
    pageTitle.innerHTML = '<i class="fa-regular fa-bell"></i> Smart Alerts';
  }

  function renderSourcesPage() {
    const freq = {};
    data.forEach(d => { if (d.source) freq[d.source] = (freq[d.source] || 0) + 1; });
    const entries = Object.entries(freq).sort((a,b)=>b[1]-a[1]);
    pageContainer.innerHTML = `
      <div style="padding:2rem;">
        <h2 style="margin-bottom:1.5rem;">Top Lead Sources</h2>
        ${entries.map(([s,c]) => `
          <div style="background:white; margin:0.5rem 0; padding:1rem 1.5rem; border-radius:3rem; display:flex; justify-content:space-between; border:1px solid #edf2f7;">
            <span>${s}</span> <strong>${c}</strong>
          </div>
        `).join('')}
      </div>`;
    pageTitle.innerHTML = '<i class="fa-regular fa-star"></i> Top Sources';
  }

  function renderNoshowPage() {
    const noshows = data.filter(d => d.status === 'Pending');
    pageContainer.innerHTML = `
      <div style="padding:2rem;">
        <h2 style="margin-bottom:1.5rem;">No‑show guard (Pending)</h2>
        ${noshows.length ? noshows.map(n => `
          <div style="background:white; padding:1rem 1.5rem; border-radius:3rem; margin:0.5rem 0; border:1px solid #edf2f7;">
            🔸 ${n.client} — ${n.date} ${n.notes ? '· ' + n.notes : ''}
          </div>
        `).join('') : '<p class="analytics-card" style="text-align:center;">All clear, no pending.</p>'}
      </div>`;
    pageTitle.innerHTML = '<i class="fa-regular fa-clock"></i> No‑show guard';
  }

  function renderAuditPage() {
    pageContainer.innerHTML = `
      <div style="padding:1rem;">
        <h2 style="margin-bottom:1.5rem;">Audit Trail</h2>
        <div class="audit-trail">
          ${auditLog.length === 0 ? '<p>No audit entries yet</p>' : ''}
          ${auditLog.slice(0, 50).map(entry => {
            const date = new Date(entry.timestamp);
            return `
              <div class="audit-entry">
                <span class="audit-time">${date.toLocaleString()}</span>
                <span><strong>${entry.action}</strong></span>
                <span>${entry.details}</span>
              </div>
            `;
          }).join('')}
        </div>
        <button class="btn-secondary" onclick="exportAuditLog()" style="margin-top:1rem;">
          <i class="fa-regular fa-file-excel"></i> Export Audit Log
        </button>
      </div>
    `;
    pageTitle.innerHTML = '<i class="fa-regular fa-clock"></i> Audit Trail';
  }

  function renderCurrentPage() {
    if (currentPage === 'appointments') renderAppointmentsPage();
    else if (currentPage === 'analytics') renderAnalyticsPage();
    else if (currentPage === 'alerts') renderAlertsPage();
    else if (currentPage === 'sources') renderSourcesPage();
    else if (currentPage === 'noshow') renderNoshowPage();
    else if (currentPage === 'audit') renderAuditPage();
    
    // Log commission status for debugging
    console.log('Current month SAT confirmed:', getSATCountThisMonth());
    console.log('Commission:', computeCommission());
  }

  function setActiveNav(page) {
    document.querySelectorAll('.nav-item').forEach(btn => btn.classList.remove('active'));
    document.getElementById(`nav-${page}`).classList.add('active');
    currentPage = page;
    renderCurrentPage();
  }

  document.getElementById('nav-appointments').addEventListener('click', ()=> setActiveNav('appointments'));
  document.getElementById('nav-analytics').addEventListener('click', ()=> setActiveNav('analytics'));
  document.getElementById('nav-alerts').addEventListener('click', ()=> setActiveNav('alerts'));
  document.getElementById('nav-sources').addEventListener('click', ()=> setActiveNav('sources'));
  document.getElementById('nav-noshow').addEventListener('click', ()=> setActiveNav('noshow'));
  document.getElementById('nav-audit').addEventListener('click', ()=> setActiveNav('audit'));

  window.exportCSV = () => {
    const csv = "Client,Date,Industry,Source,Status,CRM,Notes,Verified\n" + 
      data.map(a => `${a.client},${a.date},${a.industry},${a.source},${a.status},${a.crm},${a.notes},${a.verified}`).join('\n');
    const blob = new Blob([csv], {type:'text/csv'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = "appointments.csv";
    a.click();
    addAuditEntry('EXPORT', 'Exported data to CSV');
    showToast("CSV exported");
  };

  window.exportAuditLog = () => {
    const csv = "Timestamp,Action,Details,Appointment ID\n" + 
      auditLog.map(a => `${a.timestamp},${a.action},${a.details},${a.appointmentId || ''}`).join('\n');
    const blob = new Blob([csv], {type:'text/csv'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = "audit_log.csv";
    a.click();
    showToast("Audit log exported");
  };

  window.clearFilter = () => {
    currentFilter = "all";
    if (currentPage === 'appointments') renderAppointmentsPage();
  };

  // Initialize
  setActiveNav('appointments');
  updateTrustScore();
  
  // Test commission logic on load
  console.log('=== COMMISSION LOGIC TEST ===');
  console.log(`SAT Confirmed this month: ${getSATCountThisMonth()}`);
  console.log(`Commission: ${computeCommission()} PHP`);
  console.log(`Breakdown: ${getCommissionBreakdown()}`);
  console.log('============================');
</script>
</body>
</html>
