<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SalesFlow AI · chat‑style CRM</title>
  <!-- Font Awesome 6 (free) & Chart.js -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    body {
      background: #f7f7f8;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      transition: background 0.2s;
      padding: 1rem;
    }

    body.dark {
      background: #1a1a1c;
    }

    /* main app wrapper */
    .app-wrapper {
      display: flex;
      width: 100%;
      max-width: 1600px;
      background: transparent;
      gap: 1rem;
      height: 95vh;
      max-height: 95vh;
    }

    /* ========= SIDEBAR (fully functional) ========= */
    .sidebar {
      width: 280px;
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 28px;
      padding: 1.25rem 0.8rem;
      display: flex;
      flex-direction: column;
      box-shadow: 0 10px 30px -10px rgba(0,0,0,0.1);
      border: 1px solid rgba(0,0,0,0.05);
      transition: width 0.25s ease, padding 0.2s ease;
      overflow-x: hidden;
      flex-shrink: 0;
    }

    .sidebar.collapsed {
      width: 80px;
      padding: 1.25rem 0.4rem;
    }

    body.dark .sidebar {
      background: rgba(32, 33, 35, 0.85);
      border-color: rgba(255,255,255,0.08);
    }

    .sidebar-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 2rem;
      padding: 0 0.5rem;
    }

    .logo-area {
      display: flex;
      align-items: center;
      gap: 10px;
      overflow: hidden;
    }

    .logo-icon {
      background: #f97316;
      min-width: 36px;
      height: 36px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 1.3rem;
    }

    .logo-text {
      font-weight: 600;
      font-size: 1.25rem;
      color: #0f2b43;
      white-space: nowrap;
    }

    body.dark .logo-text {
      color: #f1f5f9;
    }

    .collapse-btn {
      background: transparent;
      border: none;
      color: #f97316;
      font-size: 1.4rem;
      cursor: pointer;
      width: 32px;
      height: 32px;
      border-radius: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .collapse-btn:hover {
      background: rgba(249,115,22,0.1);
    }

    .sidebar-nav {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 0.7rem 1rem;
      border-radius: 14px;
      color: #3c4b5c;
      font-weight: 500;
      white-space: nowrap;
      transition: 0.1s;
      cursor: pointer;
      border: none;
      background: transparent;
      width: 100%;
      text-align: left;
      font-size: 1rem;
    }

    body.dark .nav-item {
      color: #cbd5e1;
    }

    .nav-item i {
      font-size: 1.3rem;
      min-width: 28px;
      color: #f97316;
    }

    .nav-item.active {
      background: rgba(249,115,22,0.15);
      color: #f97316;
    }

    .nav-item.active i {
      color: #f97316;
    }

    .sidebar.collapsed .logo-text,
    .sidebar.collapsed .nav-item span:not(.icon-only) {
      display: none;
    }

    .sidebar.collapsed .nav-item {
      justify-content: center;
      padding: 0.7rem 0;
    }

    .feature-tag {
      background: #f97316;
      color: white;
      font-size: 0.7rem;
      border-radius: 40px;
      padding: 0.2rem 0.7rem;
      margin-left: auto;
    }

    .sidebar.collapsed .feature-tag {
      display: none;
    }

    /* ========= MAIN PANEL (dynamic content) ========= */
    .main-panel {
      flex: 1;
      background: rgba(255,255,255,0.75);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-radius: 32px;
      padding: 1.8rem 2rem;
      border: 1px solid rgba(255,255,255,0.6);
      box-shadow: 0 20px 40px -12px rgba(0,0,0,0.2);
      overflow-y: auto;
      scrollbar-width: thin;
    }

    body.dark .main-panel {
      background: rgba(25, 26, 30, 0.85);
      border-color: rgba(255,255,255,0.05);
    }

    .main-header {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .main-header h1 {
      font-size: 1.8rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      color: #0f2b43;
    }

    body.dark .main-header h1 {
      color: #f1f5f9;
    }

    .theme-toggle {
      margin-left: auto;
      background: rgba(249,115,22,0.15);
      border: 1px solid rgba(249,115,22,0.3);
      border-radius: 3rem;
      padding: 0.4rem 0.8rem;
      font-size: 1.3rem;
      cursor: pointer;
      color: #f97316;
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }

    /* Page content container (changes with navigation) */
    .page-content {
      animation: fade 0.2s ease;
    }

    @keyframes fade { from { opacity: 0.3; } to { opacity: 1; } }

    /* Commission panel, KPI, table styles (reused) */
    .commission-panel {
      background: linear-gradient(105deg, #fff3e5, #ffe8d6);
      border-left: 6px solid #f97316;
      border-radius: 1.8rem;
      padding: 1.5rem 2rem;
      margin-bottom: 2rem;
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
    }
    body.dark .commission-panel { background: #2a2c35; border-left-color: #f97316; }
    .commission-left h3 { font-weight: 600; color: #7b4a1e; }
    body.dark .commission-left h3 { color: #fcd34d; }
    .commission-left p { color: #5a3e24; }
    body.dark .commission-left p { color: #cbd5e1; }
    .commission-highlight {
      background: #f97316; color: white; padding: 0.75rem 2rem; border-radius: 4rem;
      font-weight: 700; font-size: 2.2rem; line-height: 1;
    }
    .progress-wrapper { min-width: 200px; }
    .progress-bg { background: #fcd9b6; height: 12px; border-radius: 30px; }
    .progress-fill { background: #f97316; height: 12px; border-radius: 30px; width: 0%; }
    body.dark .progress-bg { background: #334155; }

    .kpi-grid {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.25rem; margin-bottom: 2rem;
    }
    .kpi-item {
      background: white; border-radius: 1.8rem; padding: 1.2rem; text-align: center; border: 1px solid #edf2f7;
    }
    body.dark .kpi-item { background: #1e293b; border-color: #334155; }
    .kpi-item i { font-size: 1.8rem; background: #f1f5f9; padding: 0.6rem; border-radius: 2rem; color: #f97316; }

    .feature-bar {
      display: flex; flex-wrap: wrap; gap: 0.75rem; margin-bottom: 1.5rem; align-items: center;
    }
    .feature-badge {
      background: white; padding: 0.5rem 1.2rem; border-radius: 3rem; font-size: 0.9rem;
      border: 1px solid #e9eef3; display: flex; align-items: center; gap: 8px;
    }
    body.dark .feature-badge { background: #1e293b; border-color: #334155; color: #cbd5e1; }
    .filter-group {
      display: flex; gap: 6px; background: white; padding: 0.25rem; border-radius: 3rem; border: 1px solid #e2e8f0;
    }
    body.dark .filter-group { background: #0f172a; border-color: #334155; }
    .filter-group button {
      background: transparent; border: none; padding: 0.4rem 1rem; border-radius: 3rem;
      font-weight: 500; color: #475569; cursor: pointer;
    }
    .filter-group button.active-filter { background: #f97316; color: white; }
    .action-button-group { display: flex; gap: 0.5rem; margin-left: auto; }
    .btn-primary, .btn-secondary {
      border: none; padding: 0.6rem 1.5rem; border-radius: 3rem; font-weight: 600;
      cursor: pointer; display: inline-flex; align-items: center; gap: 0.5rem;
    }
    .btn-primary { background: #f97316; color: white; }
    .btn-secondary { background: #1e293b; color: white; }
    body.dark .btn-secondary { background: #f97316; color: #0f172a; }

    .table-wrapper {
      background: white; border-radius: 1.8rem; padding: 0.2rem 0 1rem 0;
      border: 1px solid #edf2f7; overflow-x: auto; margin: 1.5rem 0;
    }
    body.dark .table-wrapper { background: #1e293b; border-color: #334155; }
    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; padding: 1rem 1rem 0.8rem 1.5rem; color: #64748b; }
    td { padding: 0.8rem 1rem 0.8rem 1.5rem; border-bottom: 1px solid #f1f5f9; }
    body.dark td { border-bottom-color: #334155; color: #e2e8f0; }

    .status-dot { width: 12px; height: 12px; border-radius: 20px; display: inline-block; }
    .dot-green { background: #22c55e; } .dot-yellow { background: #facc15; } .dot-orange { background: #f97316; }

    .chart-area {
      background: white; border-radius: 1.8rem; padding: 1.5rem; border: 1px solid #edf2f7;
    }
    body.dark .chart-area { background: #1e293b; border-color: #334155; }

    /* modal & toast (unchanged) */
    .modal { display: none; position: fixed; inset:0; background:rgba(0,0,0,0.5); align-items:center; justify-content:center; z-index:1000; backdrop-filter:blur(4px);}
    .modal.active { display:flex; }
    .modal-content { background:white; border-radius:2rem; padding:2rem; max-width:600px; width:90%; max-height:90vh; overflow-y:auto; }
    body.dark .modal-content { background:#1e293b; border:1px solid #334155; }
    .form-group { margin-bottom:1rem; }
    .form-group label { display:block; margin-bottom:0.3rem; color:#475569; }
    body.dark .form-group label { color:#cbd5e1; }
    .form-group input, .form-group select { width:100%; padding:0.8rem 1rem; border:1px solid #e2e8f0; border-radius:1.5rem; background:#f8fafc; }
    body.dark .form-group input, body.dark .form-group select { background:#0f172a; color:#f1f5f9; border-color:#334155; }
    .toast { position:fixed; bottom:20px; right:20px; background:#1e293b; color:white; padding:0.8rem 1.5rem; border-radius:3rem; display:flex; align-items:center; gap:0.8rem; transform:translateX(400px); transition:transform 0.3s; z-index:2000; }
    .toast.show { transform:translateX(0); }

    /* page-specific cards for other sections */
    .insight-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 1.5rem; margin-top: 2rem;
    }
    .insight-card {
      background: white; border-radius: 2rem; padding: 2rem 1.5rem; border: 1px solid #e9eef3; text-align: center;
    }
    body.dark .insight-card { background: #1e293b; border-color: #334155; }
    .insight-card i { font-size: 2.5rem; color: #f97316; margin-bottom: 1rem; }
  </style>
</head>
<body>
<div class="app-wrapper">
  <!-- SIDEBAR WITH FUNCTIONAL BUTTONS (each leads to its own page) -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo-area">
        <div class="logo-icon"><i class="fa-regular fa-message"></i></div>
        <span class="logo-text">SalesFlow AI</span>
      </div>
      <button class="collapse-btn" id="collapseSidebarBtn"><i class="fa-solid fa-chevron-left"></i></button>
    </div>
    <div class="sidebar-nav">
      <button class="nav-item active" id="nav-appointments"><i class="fa-regular fa-calendar-check"></i> <span>Appointments</span></button>
      <button class="nav-item" id="nav-analytics"><i class="fa-regular fa-chart-bar"></i> <span>Analytics</span> <span class="feature-tag">new</span></button>
      <button class="nav-item" id="nav-alerts"><i class="fa-regular fa-bell"></i> <span>Smart Alerts</span> <span class="feature-tag">beta</span></button>
      <button class="nav-item" id="nav-sources"><i class="fa-regular fa-star"></i> <span>Top Sources</span></button>
      <button class="nav-item" id="nav-noshow"><i class="fa-regular fa-clock"></i> <span>No‑show guard</span> <span class="feature-tag">+2</span></button>
    </div>
    <div style="margin-top: auto; padding:1rem 0.5rem; color:#94a3b8; font-size:0.85rem;">
      <i class="fa-regular fa-circle-check" style="color:#22c55e;"></i> <span>8 success target</span>
    </div>
  </div>

  <!-- MAIN PANEL with dynamic page container -->
  <div class="main-panel">
    <div class="main-header">
      <h1 id="page-title"><i class="fas fa-chart-line" style="color:#f97316;"></i> commission hub</h1>
      <div class="theme-toggle" id="themeToggle"><i class="fa-regular fa-sun"></i><i class="fa-regular fa-moon"></i></div>
    </div>

    <!-- Dynamic page content will be injected here -->
    <div id="page-content-container" class="page-content">
      <!-- Default: Appointments page (fully functional) -->
    </div>
  </div>
</div>

<!-- Modals and toast (keep outside dynamic container) -->
<div class="modal" id="appointmentModal"><div class="modal-content"><div class="modal-header"><h2 id="modalTitle">Add Appointment</h2><button class="close-modal" id="closeModalBtn">&times;</button></div><div class="form-group"><label>Client *</label><input id="client"></div><div class="form-group"><label>Date *</label><input type="date" id="date"></div><div class="form-group"><label>Industry</label><select id="industry"><option>Construction</option><option>Healthcare</option><option>Ecommerce</option><option>Real Estate</option><option>Marketing</option></select></div><div class="form-group"><label>Source</label><select id="source"><option>Cold Call</option><option>LinkedIn</option><option>Referral</option><option>Email</option></select></div><div class="form-group"><label>Status</label><select id="status"><option value="green">✅ successful</option><option value="yellow">🔁 rebook</option><option value="orange">⏳ no show</option></select></div><div class="form-group"><label>CRM Link</label><input id="crm"></div><div class="form-group"><label>Notes</label><input id="notes"></div><div class="modal-actions"><button class="btn-secondary" id="cancelModalBtn">Cancel</button><button class="btn-primary" onclick="saveAppointment()">Save</button></div></div></div>
<div class="toast" id="toast"><i class="fa-regular fa-circle-check"></i><span id="toastMessage">Saved</span></div>

<script>
  (function() {
    // dark mode
    const body = document.body;
    const themeToggle = document.getElementById('themeToggle');
    if (localStorage.getItem('darkMode') === 'true') body.classList.add('dark');
    themeToggle.addEventListener('click', () => {
      body.classList.toggle('dark');
      localStorage.setItem('darkMode', body.classList.contains('dark'));
    });

    // sidebar collapse
    const sidebar = document.getElementById('sidebar');
    const collapseBtn = document.getElementById('collapseSidebarBtn');
    collapseBtn.addEventListener('click', () => {
      sidebar.classList.toggle('collapsed');
      const icon = collapseBtn.querySelector('i');
      if (sidebar.classList.contains('collapsed')) {
        icon.classList.remove('fa-chevron-left');
        icon.classList.add('fa-chevron-right');
      } else {
        icon.classList.remove('fa-chevron-right');
        icon.classList.add('fa-chevron-left');
      }
    });
  })();

  // ---- DATA (shared across all pages) ----
  let data = JSON.parse(localStorage.getItem("appointments")) || [];
  data = data.map(item => {
    if (item.status === "red") item.status = "orange";
    if (!item.id) item.id = crypto.randomUUID ? crypto.randomUUID() : Date.now() + '-' + Math.random().toString(36).substr(2,9);
    return item;
  });
  save();

  let editId = null;
  let currentFilter = "all";

  // DOM elements
  const modal = document.getElementById('appointmentModal');
  const openModalBtn = document.getElementById('openAddModalBtn'); // will be redefined per page
  const closeModalBtn = document.getElementById('closeModalBtn');
  const cancelModalBtn = document.getElementById('cancelModalBtn');
  const toast = document.getElementById('toast');
  const toastMessage = document.getElementById('toastMessage');
  const pageContainer = document.getElementById('page-content-container');
  const pageTitle = document.getElementById('page-title');

  function showToast(msg) { toastMessage.innerText = msg; toast.classList.add('show'); setTimeout(()=>toast.classList.remove('show'),2500); }
  function save() { localStorage.setItem("appointments", JSON.stringify(data)); }

  // Modal controls
  closeModalBtn.addEventListener('click', ()=>modal.classList.remove('active'));
  cancelModalBtn.addEventListener('click', ()=>modal.classList.remove('active'));
  modal.addEventListener('click', (e)=> e.target===modal && modal.classList.remove('active'));

  function clearForm() {
    document.getElementById("client").value=""; document.getElementById("date").value="";
    document.getElementById("industry").value=""; document.getElementById("source").value="";
    document.getElementById("status").value="green"; document.getElementById("crm").value=""; document.getElementById("notes").value="";
  }

  window.saveAppointment = function() {
    let client = document.getElementById("client").value.trim();
    let date = document.getElementById("date").value;
    if (!client || !date) { showToast("Client and Date required!"); return; }
    let obj = {
      id: editId || (crypto.randomUUID ? crypto.randomUUID() : Date.now()+'-'+Math.random().toString(36).substr(2,9)),
      client, date,
      industry: document.getElementById("industry").value,
      source: document.getElementById("source").value,
      status: document.getElementById("status").value,
      crm: document.getElementById("crm").value.trim(),
      notes: document.getElementById("notes").value.trim()
    };
    if (editId) {
      let idx = data.findIndex(i=>i.id===editId);
      if (idx>=0) data[idx]=obj;
      showToast("Updated");
    } else { data.push(obj); showToast("Added"); }
    save(); modal.classList.remove('active');
    renderCurrentPage(); // refresh current view
  };

  window.editAppointment = (id)=>{
    let item = data.find(a=>a.id===id); if(!item) return;
    document.getElementById("client").value=item.client||"";
    document.getElementById("date").value=item.date||"";
    document.getElementById("industry").value=item.industry||"";
    document.getElementById("source").value=item.source||"";
    document.getElementById("status").value=item.status||"green";
    document.getElementById("crm").value=item.crm||"";
    document.getElementById("notes").value=item.notes||"";
    editId=id; document.getElementById('modalTitle').innerText='Edit Appointment'; modal.classList.add('active');
  };
  window.deleteAppointment = (id)=>{ if(confirm("Delete?")){ data=data.filter(i=>i.id!==id); save(); if(editId===id) editId=null; renderCurrentPage(); showToast("Deleted"); }};

  // Helper functions for stats (used by all pages)
  function getSuccessfulThisMonth() {
    let today = new Date();
    return data.filter(a=> a.status==="green" && new Date(a.date).getMonth()===today.getMonth() && new Date(a.date).getFullYear()===today.getFullYear()).length;
  }
  function getStats() {
    let today=new Date(), week=0, month=0, year=0;
    let oneJan = new Date(today.getFullYear(),0,1);
    let currentWeek = Math.ceil((((today - oneJan) / 86400000) + oneJan.getDay()+1)/7);
    data.forEach(a=>{
      let d=new Date(a.date); if(isNaN(d)) return;
      if(d.getFullYear()===today.getFullYear()) year++;
      if(d.getMonth()===today.getMonth() && d.getFullYear()===today.getFullYear()) month++;
      let w = Math.ceil((((d - new Date(d.getFullYear(),0,1)) / 86400000)+1)/7);
      if(d.getFullYear()===today.getFullYear() && w===currentWeek) week++;
    });
    return {week,month,year};
  }
  function calculateStreak() {
    let greens = data.filter(a=>a.status==="green").map(a=>new Date(a.date).toDateString()).filter((v,i,s)=>s.indexOf(v)===i).sort((a,b)=>new Date(a)-new Date(b));
    if(!greens.length) return 0;
    let max=1, cur=1;
    for(let i=1;i<greens.length;i++) {
      let prev = new Date(greens[i-1]), curr = new Date(greens[i]);
      let diff = (curr - prev)/(1000*3600*24);
      if(diff===1) cur++; else { max=Math.max(max,cur); cur=1; }
    }
    return Math.max(max,cur);
  }
  function conversionRate() {
    let monthTotal = data.filter(a=>{ let d=new Date(a.date); return d.getMonth()===new Date().getMonth() && d.getFullYear()===new Date().getFullYear(); }).length;
    let monthGreen = getSuccessfulThisMonth();
    if(monthTotal===0) return '-';
    return Math.round((monthGreen/monthTotal)*100)+'%';
  }

  // ----- PAGE RENDERING FUNCTIONS (each corresponds to a sidebar button) -----
  function renderAppointmentsPage() {
    let filtered = currentFilter==="all"? data : data.filter(a=>a.status===currentFilter);
    let successMonth = getSuccessfulThisMonth();
    let commission = successMonth>=8 ? successMonth*750 : 0;
    let streak = calculateStreak();
    let conv = conversionRate();
    let sources = data.map(d=>d.source).filter(Boolean);
    let freq = sources.reduce((acc,s)=>(acc[s]=(acc[s]||0)+1,acc),{});
    let top = Object.keys(freq).sort((a,b)=>freq[b]-freq[a])[0];
    let industryCnt = data.filter(d=>d.industry).length;

    let html = `
      <div class="commission-panel">
        <div class="commission-left"><h3><i class="fas fa-circle-dollar-to-slot"></i> commission (success only)</h3><p>✅ only <strong>green</strong> count</p><p>📅 monthly target: 8 · after 8 = 750 PHP each</p></div>
        <div class="commission-highlight"><span>${commission} PHP</span><small>this month</small></div>
        <div class="progress-wrapper"><div class="progress-label"><span>✅ success/target</span><span>${successMonth}</span><span>/8</span></div><div class="progress-bg"><div class="progress-fill" style="width:${Math.min((successMonth/8)*100,100)}%;"></div></div></div>
      </div>
      <div class="kpi-grid">
        <div class="kpi-item"><i class="fa-regular fa-calendar-check"></i><h2>${getStats().week}</h2><p>this week</p></div>
        <div class="kpi-item"><i class="fa-regular fa-calendar"></i><h2>${getStats().month}</h2><p>this month</p></div>
        <div class="kpi-item"><i class="fa-regular fa-calendar-plus"></i><h2>${getStats().year}</h2><p>this year</p></div>
      </div>
      <div class="feature-bar">
        <div class="feature-badge"><i class="fa-regular fa-clock"></i> pending = no-show</div>
        <div class="feature-badge"><i class="fa-regular fa-star"></i> top source: ${top||'-'}</div>
        <div class="feature-badge"><i class="fa-regular fa-flag"></i> quota: ${successMonth}/8</div>
        <div class="feature-badge"><i class="fa-regular fa-fire"></i> streak: ${streak}</div>
        <div class="feature-badge"><i class="fa-regular fa-thumbs-up"></i> conv: ${conv}</div>
        <div class="filter-group" id="filterGroup">
          <button class="active-filter" data-filter="all">All</button><button data-filter="green">✅ success</button><button data-filter="yellow">🔁 rebook</button><button data-filter="orange">⏳ no show</button>
        </div>
        <div class="action-button-group">
          <button class="btn-primary" id="openAddModalBtn"><i class="fa-solid fa-plus"></i> New</button>
          <button class="btn-secondary" onclick="exportCSV()"><i class="fa-regular fa-file-excel"></i> Export</button>
          <button class="btn-secondary" onclick="clearCompletedFilter()"><i class="fa-solid fa-filter-circle-xmark"></i> Clear</button>
        </div>
      </div>
      <div class="table-wrapper">
        <table><thead><tr><th>status</th><th>client</th><th>date</th><th>industry</th><th>source</th><th>crm</th><th>notes</th><th>actions</th></tr></thead><tbody id="tableBody">`;

    filtered.forEach(a => {
      let statusClass = a.status==="green"?"dot-green":(a.status==="yellow"?"dot-yellow":"dot-orange");
      html += `<tr><td><span class="status-dot ${statusClass}"></span></td><td>${a.client||''}</td><td>${a.date||''}</td><td>${a.industry||'-'}</td><td>${a.source||'-'}</td><td>${a.crm?`<a href="${a.crm}" target="_blank" class="crm-link"><i class="fa-regular fa-link"></i> crm</a>`:'-'}</td><td>${a.notes||''}</td><td><button class="action-btn" onclick="editAppointment('${a.id}')"><i class="fa-regular fa-pen-to-square"></i></button><button class="action-btn" onclick="deleteAppointment('${a.id}')"><i class="fa-regular fa-trash-can"></i></button></td></tr>`;
    });

    html += `</tbody></table></div>
      <div class="chart-area">
        <div style="display:flex; justify-content: space-between; margin-bottom: 0.5rem;"><span><i class="fa-regular fa-chart-bar" style="color:#f97316;"></i> monthly trend</span><span class="feature-badge">📊 industry count: ${industryCnt}</span></div>
        <canvas id="chart"></canvas>
      </div>`;

    pageContainer.innerHTML = html;
    pageTitle.innerHTML = '<i class="fas fa-chart-line" style="color:#f97316;"></i> commission hub · appointments';

    // re-attach filter events
    document.querySelectorAll('#filterGroup button').forEach(b=> b.addEventListener('click', function() {
      document.querySelectorAll('#filterGroup button').forEach(bb=>bb.classList.remove('active-filter'));
      this.classList.add('active-filter'); currentFilter = this.dataset.filter; renderAppointmentsPage();
    }));

    // re-attach new button
    document.getElementById('openAddModalBtn').addEventListener('click', ()=>{ clearForm(); editId=null; document.getElementById('modalTitle').innerText='Add Appointment'; modal.classList.add('active'); });

    // render chart
    let months = new Array(12).fill(0);
    data.forEach(a=>{ let d=new Date(a.date); if(!isNaN(d)) months[d.getMonth()]++; });
    if (window.appChart) window.appChart.destroy();
    window.appChart = new Chart(document.getElementById("chart"), { type:'bar', data: { labels:["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"], datasets:[{ label:"appointments", data:months, backgroundColor:"#f97316", borderRadius:6 }] }, options:{ responsive:true, maintainAspectRatio:false, plugins:{ legend:{display:false} } } });
  }

  // Other pages (simplified, demonstrate that each button leads to a different page)
  function renderAnalyticsPage() {
    let successMonth = getSuccessfulThisMonth();
    let total = data.length;
    pageContainer.innerHTML = `
      <div style="text-align:center; padding:3rem;"><i class="fa-regular fa-chart-bar" style="font-size:4rem; color:#f97316;"></i>
      <h2 style="margin:1rem 0;">Analytics Dashboard</h2>
      <div class="insight-grid">
        <div class="insight-card"><i class="fa-regular fa-calendar"></i><h3>Total appointments</h3><p style="font-size:2rem;">${total}</p></div>
        <div class="insight-card"><i class="fa-regular fa-face-smile"></i><h3>Successful</h3><p style="font-size:2rem;">${data.filter(d=>d.status==='green').length}</p></div>
        <div class="insight-card"><i class="fa-regular fa-clock"></i><h3>No‑show rate</h3><p style="font-size:2rem;">${total? Math.round((data.filter(d=>d.status==='orange').length/total)*100) : 0}%</p></div>
        <div class="insight-card"><i class="fa-regular fa-star"></i><h3>Conversion (month)</h3><p style="font-size:2rem;">${conversionRate()}</p></div>
      </div>
      <p style="margin-top:2rem; color:#64748b;">Detailed analytics coming soon.</p></div>`;
    pageTitle.innerHTML = '<i class="fa-regular fa-chart-bar" style="color:#f97316;"></i> Analytics';
  }
  function renderAlertsPage() {
    let now = new Date();
    let upcoming = data.filter(a => new Date(a.date) > now && a.status !== 'green').length;
    pageContainer.innerHTML = `
      <div style="text-align:center; padding:3rem;"><i class="fa-regular fa-bell" style="font-size:4rem; color:#f97316;"></i>
      <h2 style="margin:1rem 0;">Smart Alerts</h2>
      <div class="insight-grid">
        <div class="insight-card"><i class="fa-regular fa-hourglass-half"></i><h3>Pending follow‑ups</h3><p style="font-size:2rem;">${upcoming}</p></div>
        <div class="insight-card"><i class="fa-regular fa-circle-exclamation"></i><h3>No‑show watch</h3><p style="font-size:2rem;">${data.filter(d=>d.status==='orange').length}</p></div>
      </div>
      <p style="margin-top:2rem;">Notifications and reminders will appear here.</p></div>`;
    pageTitle.innerHTML = '<i class="fa-regular fa-bell" style="color:#f97316;"></i> Smart Alerts';
  }
  function renderSourcesPage() {
    let sources = data.map(d=>d.source).filter(Boolean);
    let freq = sources.reduce((acc,s)=>(acc[s]=(acc[s]||0)+1,acc),{});
    let entries = Object.entries(freq).sort((a,b)=>b[1]-a[1]);
    pageContainer.innerHTML = `
      <div style="padding:2rem;"><i class="fa-regular fa-star" style="font-size:3rem; color:#f97316; display:block; text-align:center;"></i>
      <h2 style="text-align:center; margin:1rem;">Top Lead Sources</h2>
      <div style="display:flex; flex-direction:column; gap:1rem; max-width:400px; margin:2rem auto;">
        ${entries.map(([src,cnt]) => `<div style="display:flex; justify-content:space-between; background:white; padding:1rem 2rem; border-radius:3rem;"><span>${src}</span><strong>${cnt}</strong></div>`).join('')}
      </div></div>`;
    pageTitle.innerHTML = '<i class="fa-regular fa-star" style="color:#f97316;"></i> Top Sources';
  }
  function renderNoshowPage() {
    let noshows = data.filter(d=>d.status==='orange');
    pageContainer.innerHTML = `
      <div style="padding:2rem;"><i class="fa-regular fa-clock" style="font-size:3rem; color:#f97316; display:block; text-align:center;"></i>
      <h2 style="text-align:center; margin:1rem;">No‑show guard</h2>
      <p style="text-align:center; margin-bottom:2rem;">Clients marked as pending (orange) — follow up.</p>
      <div style="background:white; border-radius:2rem; padding:1.5rem;">
        ${noshows.length? noshows.map(n=>`<div style="padding:0.5rem 0;">🔸 ${n.client} — ${n.date}</div>`).join('') : '<p style="text-align:center;">All clear, no pending no-shows.</p>'}
      </div></div>`;
    pageTitle.innerHTML = '<i class="fa-regular fa-clock" style="color:#f97316;"></i> No‑show guard';
  }

  function renderCurrentPage() {
    if (currentPage === 'appointments') renderAppointmentsPage();
    else if (currentPage === 'analytics') renderAnalyticsPage();
    else if (currentPage === 'alerts') renderAlertsPage();
    else if (currentPage === 'sources') renderSourcesPage();
    else if (currentPage === 'noshow') renderNoshowPage();
  }

  // Navigation: set active class and render corresponding page
  let currentPage = 'appointments';
  function setActiveNav(pageId) {
    document.querySelectorAll('.nav-item').forEach(btn => btn.classList.remove('active'));
    document.getElementById(`nav-${pageId}`).classList.add('active');
    currentPage = pageId;
    renderCurrentPage();
  }

  document.getElementById('nav-appointments').addEventListener('click', ()=> setActiveNav('appointments'));
  document.getElementById('nav-analytics').addEventListener('click', ()=> setActiveNav('analytics'));
  document.getElementById('nav-alerts').addEventListener('click', ()=> setActiveNav('alerts'));
  document.getElementById('nav-sources').addEventListener('click', ()=> setActiveNav('sources'));
  document.getElementById('nav-noshow').addEventListener('click', ()=> setActiveNav('noshow'));

  // Global functions for export/filter
  window.exportCSV = ()=>{
    let csv = "Client,Date,Industry,Source,Status,CRM,Notes\n";
    data.forEach(a=> csv += `${a.client},${a.date},${a.industry},${a.source},${a.status},${a.crm},${a.notes}\n`);
    let blob = new Blob([csv],{type:'text/csv'}), a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download="appointments.csv"; a.click(); showToast("CSV exported");
  };
  window.clearCompletedFilter = ()=>{ currentFilter = "all"; renderAppointmentsPage(); };

  // Initial render
  setActiveNav('appointments');
</script>
</body>
</html>
